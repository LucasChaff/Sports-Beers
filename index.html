// ── LEADERBOARD ──
function buildLeaderboardTimeline() {
  const ptsMvpR1 = Number(state.settings['points_mvp_premier_tour'] ?? 1);
  const ptsMvpSF = Number(state.settings['points_mvp_demi_finales'] ?? 2);
  const ptsMvpCF = Number(state.settings['points_mvp_finales_conference'] ?? 4);
  const ptsMvpFN = Number(state.settings['points_mvp_finales_nba'] ?? 8);
  const actualMvp = String(state.settings['actual_mvp'] ?? '').trim().toLowerCase();

  const timeline = [];
  const totals = {};
  const awardedGamePoints = new Set();
  const awardedSeriesWinnerPoints = new Set();
  const awardedSeriesExactPoints = new Set();
  const awardedMvpPoints = new Set();

  state.players.forEach(p => {
    totals[p.id] = 0;
  });

  const events = [];

  Object.values(state.games).flat().forEach(g => {
    if (g.status === 'finished' && g.winner) {
      events.push({
        type: 'game',
        sortDate: g.updated_at || g.start_time || '',
        game: g
      });
    }
  });

  state.series.forEach(s => {
    if (s.status === 'finished' && s.series_winner) {
      events.push({
        type: 'series',
        sortDate: s.updated_at || s.start_time || '',
        series: s
      });
    }
  });

  if (actualMvp) {
    state.mvpPredictions.forEach(mp => {
      events.push({
        type: 'mvp',
        sortDate: mp.updated_at || '',
        mvpPrediction: mp
      });
    });
  }

  events.sort((a, b) => String(a.sortDate).localeCompare(String(b.sortDate)));

  function pushSnapshot(label) {
    timeline.push({
      label,
      points: state.players.map(p => ({
        player_id: p.id,
        name: p.name,
        color: p.avatar_color,
        total: totals[p.id] || 0
      }))
    });
  }

  events.forEach(ev => {
    if (ev.type === 'game') {
      const g = ev.game;
      const s = state.series.find(x => x.id === g.series_id);
      if (!s) return;

      const roundPoints = getRoundPoints(s.round);
      const ptsMW = roundPoints.match;
      const keyBase = `${g.series_id}::${g.game_number}`;

      state.predictions.forEach(pred => {
        const gp = Array.isArray(pred.game_predictions)
          ? pred.game_predictions.find(x => Number(x.game_number) === Number(g.game_number))
          : null;

        if (!gp) return;
        if (gp.predicted_winner !== g.winner) return;

        const awardKey = `${pred.player_id}::${keyBase}`;
        if (awardedGamePoints.has(awardKey)) return;

        totals[pred.player_id] = (totals[pred.player_id] || 0) + ptsMW;
        awardedGamePoints.add(awardKey);
      });

      pushSnapshot(`${shortTeamName(s.team1)}-${shortTeamName(s.team2)} · M${g.game_number}`);
    }

    if (ev.type === 'series') {
      const s = ev.series;
      const roundPoints = getRoundPoints(s.round);
      const ptsSW = roundPoints.series;
      const ptsSE = roundPoints.exact;

      state.predictions
        .filter(pred => pred.series_id === s.id)
        .forEach(pred => {
          const winKey = `${pred.player_id}::${s.id}::winner`;
          const exactKey = `${pred.player_id}::${s.id}::exact`;

          if (
            pred.predicted_series_winner === s.series_winner &&
            !awardedSeriesWinnerPoints.has(winKey)
          ) {
            totals[pred.player_id] = (totals[pred.player_id] || 0) + ptsSW;
            awardedSeriesWinnerPoints.add(winKey);
          }

          if (
            pred.predicted_series_winner === s.series_winner &&
            Number(pred.predicted_series_games) === Number(s.series_games) &&
            !awardedSeriesExactPoints.has(exactKey)
          ) {
            totals[pred.player_id] = (totals[pred.player_id] || 0) + ptsSE;
            awardedSeriesExactPoints.add(exactKey);
          }
        });

      pushSnapshot(`${shortTeamName(s.team1)}-${shortTeamName(s.team2)} · Série`);
    }

    if (ev.type === 'mvp') {
      const mp = ev.mvpPrediction;
      const predictedMvp = String(mp.predicted_mvp ?? '').trim().toLowerCase();
      if (!predictedMvp || predictedMvp !== actualMvp) return;

      const mvpKey = `${mp.player_id}::${mp.playoff_round}::${predictedMvp}`;
      if (awardedMvpPoints.has(mvpKey)) return;

      let pts = 0;
      if (mp.playoff_round === 'Premier tour') pts = ptsMvpR1;
      else if (mp.playoff_round === 'Demi-finales') pts = ptsMvpSF;
      else if (mp.playoff_round === 'Finales de conférence') pts = ptsMvpCF;
      else if (mp.playoff_round === 'Finales NBA') pts = ptsMvpFN;

      if (pts > 0) {
        totals[mp.player_id] = (totals[mp.player_id] || 0) + pts;
        awardedMvpPoints.add(mvpKey);
        pushSnapshot(`MVP · ${mp.playoff_round}`);
      }
    }
  });

  return timeline;
}

function renderLeaderboardTrendChart() {
  const timeline = buildLeaderboardTimeline();

  if (!timeline.length) {
    return `
      <div class="card">
        <div style="font-size:13px;color:var(--muted)">
          Le graphique apparaîtra dès que des matchs ou séries auront été validés.
        </div>
      </div>
    `;
  }

  const width = 320;
  const height = 220;

  const padL = 28;
  const padR = 10;
  const padT = 12;
  const padB = 24;

  const innerW = width - padL - padR;
  const innerH = height - padT - padB;

  const allValues = timeline.flatMap(step => step.points.map(p => p.total));
  const rawMaxY = Math.max(1, ...allValues);
  const maxY = Math.ceil(rawMaxY * 1.1);

  // Axe X auto-ajusté selon le nombre d'étapes
  const xAt = i => {
    if (timeline.length <= 1) return padL + innerW / 2;
    return padL + (i / (timeline.length - 1)) * innerW;
  };

  // Axe Y auto-ajusté selon le score max
  const yAt = v => padT + innerH - (v / maxY) * innerH;

  const gridLines = 4;
  const yGrid = Array.from({ length: gridLines + 1 }, (_, i) => {
    const val = Math.round((maxY * i) / gridLines);
    const y = yAt(val);
    return `
      <line x1="${padL}" y1="${y}" x2="${width - padR}" y2="${y}" stroke="rgba(255,255,255,0.08)" />
      <text x="${padL - 6}" y="${y + 3}" text-anchor="end" font-size="9" fill="rgba(200,205,240,0.5)">${val}</text>
    `;
  }).join('');

  const xLabels = timeline.map((step, i) => `
    <text x="${xAt(i)}" y="${height - 8}" text-anchor="middle" font-size="9" fill="rgba(200,205,240,0.45)">
      ${i % 2 === 0 ? i + 1 : ''}
    </text>
  `).join('');

  const lines = state.players.map(player => {
    const pts = timeline.map(step => {
      const row = step.points.find(p => p.player_id === player.id);
      return row ? row.total : 0;
    });

    const d = pts.map((v, i) => `${i === 0 ? 'M' : 'L'} ${xAt(i)} ${yAt(v)}`).join(' ');

    const dots = pts.map((v, i) => `
      <circle cx="${xAt(i)}" cy="${yAt(v)}" r="2.5" fill="${player.avatar_color}" />
    `).join('');

    return `
      <path d="${d}" fill="none" stroke="${player.avatar_color}" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" />
      ${dots}
    `;
  }).join('');

  const legend = state.players.map(player => `
    <div style="display:flex;align-items:center;gap:6px;font-size:11px">
      <span style="width:8px;height:8px;border-radius:50%;background:${player.avatar_color};display:inline-block"></span>
      <span>${player.name}</span>
    </div>
  `).join('');

  const lastStep = timeline[timeline.length - 1];

  return `
    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:8px">
        <div>
          <div style="font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:800;text-transform:uppercase">
            Évolution
          </div>
          <div style="font-size:11px;color:var(--muted)">
            Points cumulés par étape
          </div>
        </div>
        <span class="badge badge-blue">${timeline.length}</span>
      </div>

      <div style="overflow-x:auto">
        <svg viewBox="0 0 ${width} ${height}" style="width:100%;min-width:320px;height:auto;display:block">
          ${yGrid}
          <line x1="${padL}" y1="${height - padB}" x2="${width - padR}" y2="${height - padB}" stroke="rgba(255,255,255,0.12)" />
          <line x1="${padL}" y1="${padT}" x2="${padL}" y2="${height - padB}" stroke="rgba(255,255,255,0.12)" />
          ${lines}
          ${xLabels}
        </svg>
      </div>

      <div style="display:flex;flex-wrap:wrap;gap:10px;margin-top:10px">
        ${legend}
      </div>

      <div style="margin-top:8px;font-size:10px;color:var(--muted)">
        Dernière étape : ${lastStep.label}
      </div>
    </div>
  `;
}

function renderPredictions() {
  if(!state.series.length) return `<div class="empty"><span class="empty-icon">📋</span>Aucune série disponible.<br>L'admin doit les ajouter.</div>`;
  const ROUND_ORDER = ['Premier tour','Demi-finales','Finales de conférence','Finales NBA'];
  const activeSeries = state.series.filter(s => s.status !== 'finished');
  if (!activeSeries.length) return `<div class="empty"><span class="empty-icon">✅</span>Toutes les séries sont terminées.<br>Consulte l'onglet Séries pour les résultats.</div>`;
  const rounds = [...new Set(activeSeries.map(s => s.round))].sort((a,b) => ROUND_ORDER.indexOf(a) - ROUND_ORDER.indexOf(b));
  return rounds.map(r => {
    const ss = activeSeries.filter(s => s.round === r);
    return `<div class="section-label">${r}</div>` + ss.map(s => renderPredCard(s)).join('');
  }).join('');
}

        ${(() => {
          const hasMyPred = !!mp || (predTemp[pid]?.winner && predTemp[pid]?.games);
          const isDD = !!myDoubleDown(s.id);

      ${mvpRounds.map(round => {

        const champLogo = champTeam ? teamLogo(champTeam) : null;
        const mvpPred = myMvpPred(round);
        const mvpName = mvpPred?.predicted_mvp || '';
        const mvpCandidate = MVP_CANDIDATES.find(c => c.name === mvpName);
        const mvpLocked = isMvpLocked(round);
        const actualMvpSetting = String(state.settings['actual_mvp'] ?? '').trim();
        const mvpHit = actualMvpSetting && mvpName.toLowerCase() === actualMvpSetting.toLowerCase();
        const roundShort = { 'Premier tour':'R1', 'Demi-finales':'1/2', 'Finales de conférence':'Conf.', 'Finales NBA':'Finale' }[round] || round;
        const champContent = champTeam
          ? (champLogo ? `<img src="${champLogo}" style="width:14px;height:14px;object-fit:contain;flex-shrink:0" onerror="this.style.display='none'"> <span style="max-width:72px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${champTeam}</span>` : `🏀 ${champTeam}`)
          : '🏆 <span style="color:var(--muted)">Champion ?</span>';
        const champStyle = champTeam
          ? (actualChampion ? (champHit ? 'background:rgba(29,185,84,0.12);border-color:rgba(29,185,84,0.3);color:var(--green)' : 'background:rgba(232,66,42,0.1);border-color:rgba(232,66,42,0.25);color:#ff8068') : 'background:rgba(245,197,24,0.1);border-color:rgba(245,197,24,0.25);color:var(--gold)')
          : 'background:rgba(255,255,255,0.04);border-color:var(--border2);color:var(--dim)';
        const mvpContent = mvpName
          ? (mvpCandidate ? `<img src="${playerPhoto(mvpCandidate.espnId)}" style="width:14px;height:14px;border-radius:50%;object-fit:cover;object-position:top;flex-shrink:0" onerror="this.style.display='none'"> <span style="max-width:72px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${mvpCandidate.short}</span>` : `👑 <span style="max-width:72px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${mvpName}</span>`)
          : '👑 <span style="color:var(--muted)">MVP ?</span>';
        const mvpStyle = mvpName

            <button onclick="${mvpLocked && !mvpName ? '' : `openMvpPicker('${round}')`}" ${mvpLocked && !mvpName ? 'disabled' : ''} style="display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;font-family:'Barlow',sans-serif;padding:4px 9px;border-radius:999px;border:1px solid;cursor:${mvpLocked && !mvpName ? 'default' : 'pointer'};flex:1;min-width:0;${mvpStyle};transition:opacity .15s" ${mvpLocked && !mvpName ? '' : `onmouseover="this.style.opacity='.75'" onmouseout="this.style.opacity='1'"`}>${mvpContent}</button>
            <span style="font-size:13px;color:var(--dim);flex-shrink:0">${(champLocked || mvpLocked) ? '🔒' : ''}</span>
          </div>
        `;

    </div>

    <div class="section-label">Mes pronostics</div>
    ${roundsHTML || `<div class="empty"><span class="empty-icon">🧠</span>Aucun pronostic pour l'instant</div>`}

    <div class="section-label">À compléter</div>
    ${todo.length ? `
      <div class="card">
        ${todo.map(s => `
          <div class="lb-row">
            <div style="flex:1">
              <div style="font-weight:600">${s.team1} vs ${s.team2}</div>
              <div style="font-size:11px;color:var(--muted);margin-top:2px">
                ${s.conference && s.conference !== '—' ? `${s.conference} · ` : ''}${s.round}
              </div>
            </div>
            <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
              ${s.start_time ? countdownBadgeHTML(s.start_time) : ''}
              <button class="btn btn-sm" onclick="navTo('predictions')">Faire →</button>
            </div>
          </div>
        `).join('')}
      </div>
    ` : `<div class="empty"><span class="empty-icon">✅</span>Tout est complété</div>`}
  `;
}

function toggleMyPicksRound(round) {
  myPicksOpen[round] = !myPicksOpen[round];
  const safeId = 'mypicks_' + round.replace(/\s+/g,'_').replace(/[^a-zA-Z0-9_]/g,'');
  const body = document.getElementById(safeId + '_body');
  const arrow = document.getElementById(safeId + '_arrow');
  if (body) body.style.display = myPicksOpen[round] ? '' : 'none';
  if (arrow) arrow.style.transform = myPicksOpen[round] ? 'rotate(180deg)' : 'rotate(0deg)';
}


function renderMyPickCard(s, p) {
  const allGames = state.games[s.id] || [];
  const isFinished = s.status === 'finished';
  const isLocked = s.status === 'locked' || isLockedSeriesForMyPick(s);

  // Ne montrer que les matchs pertinents :
  // - Si la série est terminée : uniquement les matchs joués
  // - Sinon : matchs joués + prochain match à venir (premier non terminé)
  let games;
  if (isFinished) {
    games = allGames.filter(g => g.status === 'finished');
  } else {
    const played = allGames.filter(g => g.status === 'finished');
    const nextGame = allGames.find(g => g.status !== 'finished');
    games = nextGame ? [...played, nextGame] : played;
  }
  games = games.slice().sort((a, b) => a.game_number - b.game_number);

  const roundPoints = getRoundPoints(s.round);
  const ptsMW = roundPoints.match;
  const ptsSW = roundPoints.series;
  const ptsSE = roundPoints.exact;

  let pointsGames = 0;
  let pointsSeriesWinner = 0;
  let pointsSeriesExact = 0;

  const gamePreds = p.game_predictions || [];

  allGames.forEach(g => {
    if (g.status !== 'finished' || !g.winner) return;
    const gp = gamePreds.find(x => Number(x.game_number) === Number(g.game_number));
    if (gp && gp.predicted_winner === g.winner) pointsGames += ptsMW;
  });

  if (isFinished && s.series_winner) {
    if (p.predicted_series_winner === s.series_winner) {
      pointsSeriesWinner = ptsSW;
      if (Number(p.predicted_series_games) === Number(s.series_games)) {
        pointsSeriesExact = ptsSE;
      }
    }
  }

  const hasDD = !!myDoubleDown(s.id);
  const ddActive = hasDD && pointsSeriesWinner > 0;
  const displayGames = ddActive ? pointsGames * 2 : pointsGames;
  const displaySW = ddActive ? pointsSeriesWinner * 2 : pointsSeriesWinner;
  const displaySE = ddActive ? pointsSeriesExact * 2 : pointsSeriesExact;
  const displayTotal = displayGames + displaySW + displaySE;

  let statusBadge = '';
  if (isFinished) statusBadge = `<span class="badge badge-green">Terminé</span>`;
  else if (isLocked) statusBadge = `<span class="badge badge-amber">Verrouillé</span>`;
  else statusBadge = `<span class="badge badge-blue">Ouvert</span>`;

  // Résultat réel vs pronostic (série terminée)
  const predWinOk = isFinished && p.predicted_series_winner === s.series_winner;
  const predExactOk = predWinOk && Number(p.predicted_series_games) === Number(s.series_games);

  return `
    <div style="padding:12px 0;border-bottom:1px solid var(--border)">
      <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:8px">
        <div>
          <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em">
            ${s.conference && s.conference !== '—' ? `${s.conference} · ` : ''}${s.round}
          </div>
          <div style="font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;line-height:1.1">
            ${s.team1} <span style="color:var(--muted)">vs</span> ${s.team2}
          </div>
        </div>
        ${statusBadge}
      </div>

      ${isFinished ? `
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">
          <div style="background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:12px;padding:10px 12px">
            <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:3px">Mon prono</div>
            <div style="font-size:14px;font-weight:700;display:flex;align-items:center;gap:6px">
              🧠 ${p.predicted_series_winner} en ${p.predicted_series_games}
              ${hasDD ? `<span class="dd-badge" style="font-size:9px">🎲</span>` : ''}
            </div>
          </div>
          <div style="background:rgba(29,185,84,0.07);border:1px solid rgba(29,185,84,0.2);border-radius:12px;padding:10px 12px">
            <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:3px">Résultat réel</div>
            <div style="font-size:14px;font-weight:700;color:var(--green)">
              🏆 ${s.series_winner} en ${s.series_games}
            </div>
          </div>
        </div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px">
          <span class="pts-chip ${displayGames > 0 ? 'hit' : ''}">🏀 Matchs : +${displayGames}</span>
          <span class="pts-chip ${displaySW > 0 ? 'hit' : ''}">📊 Série : ${predWinOk ? '+' + displaySW + ' ✓' : '✗'}</span>
          <span class="pts-chip ${displaySE > 0 ? 'hit' : ''}">🎯 Exact : ${predExactOk ? '+' + displaySE + ' ✓' : '✗'}</span>
          ${ddActive ? `<span class="pts-chip hit" style="background:rgba(245,197,24,0.15);border-color:rgba(245,197,24,0.35);color:var(--gold)">🎲 doublé !</span>` : ''}
        </div>
      ` : `
        <div style="background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:14px;padding:12px;margin-bottom:10px">
          <div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px">Mon pronostic</div>
          <div style="font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px">
            🧠 ${p.predicted_series_winner} en ${p.predicted_series_games}
            ${hasDD ? `<span class="dd-badge">🎲 ×2</span>` : ''}
          </div>
          ${hasDD ? `
            <div class="dd-info-box" style="margin-top:8px">
              <span>🎲</span><span>Bonus risqué activé — points doublés si tu trouves le bon vainqueur</span>
            </div>
          ` : ''}
        </div>
      `}

      ${games.length ? `
        <div style="margin-top:4px">
          <div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px">
            Mes matchs
          </div>
          ${games.map(g => {
            const gp = gamePreds.find(x => Number(x.game_number) === Number(g.game_number));
            const predicted = gp?.predicted_winner || '—';
            const correct = g.status === 'finished' && gp && gp.predicted_winner === g.winner;
            return `
              <div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.04);font-size:12px">
                <span style="color:var(--muted);min-width:52px">M${g.game_number}</span>
                <span style="flex:1;font-weight:600">${predicted}</span>
                ${g.status === 'finished'
                  ? `<span style="font-size:11px;color:var(--muted)">${g.winner}</span>
                     <span class="badge ${correct ? 'badge-green' : 'badge-red'}">${correct ? '✓' : '✗'}</span>`
                  : `<span class="badge badge-gray">à venir</span>`}
              </div>
            `;
          }).join('')}
        </div>
      ` : ''}

      ${isFinished ? `
        <div style="margin-top:10px;display:flex;justify-content:space-between;align-items:center">
          <span style="font-size:12px;color:var(--muted)">Total gagné sur cette série</span>
          <span style="font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:800;color:${ddActive ? 'var(--gold)' : displayTotal > 0 ? 'var(--green)' : 'var(--muted)'}">
            +${displayTotal}${ddActive ? ' 🎲' : ''}
          </span>
        </div>
      ` : `
        <div style="margin-top:10px;font-size:12px;color:var(--muted)">
          ${isLocked ? 'Les pronostics sont verrouillés pour cette série.' : 'Cette série est encore en cours.'}
        </div>
      `}
    </div>
  `;
}

function renderGamePredRow(g, s, mp, pid) {
  const gamePreds = mp?.game_predictions||[];
  const gpKey = `gp_${s.id}`;
  const tmpGP = predTemp[gpKey]?.gamePreds||{};
  // BUG FIX: check tempState first, then saved pred
  const savedGP = gamePreds.find(p=>Number(p.game_number)===Number(g.game_number));
  const myGWinner = tmpGP[g.game_number] || savedGP?.predicted_winner || null;
  const gid = `gp_${s.id.replace(/-/g,'_')}_g${g.game_number}`;

  if(g.status==='finished') {
    const ok=myGWinner===g.winner;
    return `<div class="game-row">

    </div>`;
  } else if(isGameLocked(g)) {
    return `<div class="game-row">
      <span style="color:var(--muted);min-width:62px;font-size:12px">Match ${g.game_number}</span>
      <span style="flex:1;font-size:11px;color:var(--muted)">${fmtDate(g.start_time)}</span>

  } else {
    return `<div style="padding:8px 0;border-bottom:1px solid var(--border)">
      <div style="font-size:11px;color:var(--muted);margin-bottom:6px">Match ${g.game_number} · ${fmtDate(g.start_time)}</div>

function pickGameWinner(seriesId, gid, gameNumber, team) {
  const key = `gp_${seriesId}`;
  if (!predTemp[key]) predTemp[key] = {};
  if (!predTemp[key].gamePreds) predTemp[key].gamePreds = {};

  predTemp[key].gamePreds[gameNumber] = team;

  document.querySelectorAll(`#${gid} .team-btn`).forEach(b => {
    b.classList.toggle('selected', b.textContent.trim() === team);
  });
}
async function submitPred(seriesId, pid, team1, team2) {
  const mp = myPred(seriesId);
  const tmp = predTemp[pid] || {};

  const winner = tmp.winner !== undefined ? tmp.winner : mp?.predicted_series_winner;
  const games = tmp.games !== undefined ? tmp.games : (mp ? Number(mp.predicted_series_games) : null);

  if (!winner) return toast('Choisis le vainqueur !');
  if (!games) return toast('Choisis le nombre de matchs !');

  const gpKey = `gp_${seriesId}`;
  const tmpGP = predTemp[gpKey]?.gamePreds || {};
  const existingGP = mp?.game_predictions || [];
  const sGames = state.games[seriesId] || [];

  const gamePredsList = sGames.map(g => {
    const tw = tmpGP[g.game_number];
    const ew = existingGP.find(p => Number(p.game_number) === Number(g.game_number))?.predicted_winner;
    const pw = tw || ew || null;
    return pw ? { game_number: Number(g.game_number), predicted_winner: pw } : null;
  }).filter(Boolean);

  // ✅ Nouveau verrou : obliger tous les matchs à être pronostiqués
  const unlockedGames = sGames.filter(g => g.status !== 'finished');

  const missingGameNumbers = unlockedGames
    .filter(g => {
      const gp = gamePredsList.find(p => Number(p.game_number) === Number(g.game_number));
      return !gp || !gp.predicted_winner;
    })
    .map(g => g.game_number);

  if (missingGameNumbers.length) {
    return toast('Tu dois renseigner les 7 matchs avant de valider.');
  }

  const ok = await savePrediction(seriesId, winner, games, gamePredsList);
  if (!ok) return;

  delete predTemp[pid];
  delete predTemp[`gp_${seriesId}`];
  stopEditingSeries(seriesId);

  render();
}

function openPredsTable(seriesId) {
  const s = state.series.find(x => x.id === seriesId);
  if (!s) return;
  const sGames = state.games[seriesId] || [];
  const ap = state.predictions.filter(p => p.series_id === seriesId);
  const cp = state.currentPlayer;

  // Build header columns: Serie col + game cols
  // Only show games up to the last played one (or all 7 if none played)
  const maxGame = sGames.length ? Math.max(...sGames.map(g => g.game_number)) : 7;
  const gameCols = sGames.slice(0, maxGame);

  // Header row
  const thGames = gameCols.map(g => {
    const isFinished = g.status === 'finished';
    return `<th>${isFinished ? '🏆' : ''}<br>M${g.game_number}</th>`;
  }).join('');

  // Result row (actual results)
  const tdResults = gameCols.map(g => {
    if (g.status !== 'finished') return `<td><span class="pt-cell empty">—</span></td>`;
    return `<td><span class="pt-cell hit" style="background:rgba(29,185,84,0.2);color:var(--green);border-color:rgba(29,185,84,0.4)">${shortTeamName(g.winner)}</span></td>`;
  }).join('');

  // Player rows
  const playerRows = ap.map(pr => {
    const pl = getPlayer(pr.player_id);
    if (!pl) return '';
    const isMe = pl.id === cp?.id;
    const gamePreds = Array.isArray(pr.game_predictions) ? pr.game_predictions : [];
    const isSeriesFinished = s.status === 'finished';
    const seriesHit = isSeriesFinished && pr.predicted_series_winner === s.series_winner;
    const seriesExact = seriesHit && Number(pr.predicted_series_games) === Number(s.series_games);
    const seriesCls = seriesExact ? 'series-exact' : seriesHit ? 'series-hit' : '';

    const tdGames = gameCols.map(g => {
      const gp = gamePreds.find(p => Number(p.game_number) === Number(g.game_number));
      const pred = gp?.predicted_winner;
      if (!pred) return `<td><span class="pt-cell empty">—</span></td>`;
      if (g.status !== 'finished') return `<td><span class="pt-cell pending">${shortTeamName(pred)}</span></td>`;
      const hit = pred === g.winner;
      return `<td><span class="pt-cell ${hit ? 'hit' : 'miss'}">${shortTeamName(pred)}</span></td>`;
    }).join('');

    return `<tr>
      <td>
        <div class="pt-player">
          ${avatarImg(pl, '26px')}
          <div class="pt-name">${pl.name}${isMe ? ' <span style="font-size:9px;color:var(--accent)">toi</span>' : ''}</div>
        </div>
      </td>
      <td><span class="pt-series ${seriesCls}">${shortTeamName(pr.predicted_series_winner)} en ${pr.predicted_series_games}</span></td>
      ${tdGames}
    </tr>`;
  }).join('');

  const html = `
    <div class="preds-overlay" id="preds-overlay" onclick="closePredsTable(event)">
      <div class="preds-sheet" onclick="event.stopPropagation()">
        <div class="preds-sheet-handle"></div>
        <div class="preds-sheet-header">
          <div>
            <div class="preds-sheet-title">
              ${s.team1} <span style="color:var(--muted);font-weight:400">vs</span> ${s.team2}
            </div>
            <div class="preds-sheet-sub">
              ${s.conference && s.conference !== '—' ? s.conference + ' · ' : ''}${s.round}
            </div>
          </div>
          <button class="btn btn-sm btn-ghost" onclick="document.getElementById('preds-overlay').remove()">✕</button>
        </div>
        <div class="preds-table-wrap">
          <table class="preds-table">
            <thead>
              <tr>
                <th>Joueur</th>
                <th>Série</th>
                ${thGames}
              </tr>
            </thead>
            <tbody>
              ${s.status === 'finished' || sGames.some(g => g.status === 'finished') ? `
              <tr class="result-row">
                <td style="font-size:10px;color:var(--muted);font-weight:700;letter-spacing:0.06em;text-transform:uppercase">Résultat</td>
                <td>${s.status === 'finished' ? `<span class="pt-series series-hit">${shortTeamName(s.series_winner)} en ${s.series_games}</span>` : '<span style="color:var(--dim);font-size:11px">En cours</span>'}</td>
                ${tdResults}
              </tr>` : ''}
              ${playerRows}
            </tbody>
          </table>
        </div>
        <div style="padding:10px 16px 0;font-size:11px;color:var(--muted)">
  <span class="pt-cell hit">bon</span>
  <span class="pt-cell miss" style="margin-left:6px">raté</span>
  <span class="pt-cell pending" style="margin-left:6px">à venir</span>
</div>
        <div style="padding:14px 16px 0;flex-shrink:0">
          <button class="btn btn-ghost btn-block btn-sm" onclick="document.getElementById('preds-overlay').remove()">Fermer</button>
        </div>
      </div>
    </div>`;

  document.body.insertAdjacentHTML('beforeend', html);
}

function toggleSeriesRound(round) {
  const safeId = round.replace(/\s+/g,'_').replace(/[^a-zA-Z0-9_]/g,'');
  const body   = document.getElementById('sr-body-' + safeId);
  const arrow  = document.getElementById('sr-arrow-' + safeId);
  if (!body) return;

  const isOpen = seriesPageOpen[round] !== false;
  seriesPageOpen[round] = !isOpen;

  if (isOpen) {
    body.style.maxHeight = body.scrollHeight + 'px';
    body.style.overflow  = 'hidden';
    requestAnimationFrame(() => {
      body.style.transition = 'max-height .35s cubic-bezier(.4,0,.2,1), opacity .28s ease';
      body.style.maxHeight  = '0';
      body.style.opacity    = '0';
    });
    if (arrow) { arrow.style.transition = 'transform .35s ease'; arrow.style.transform = 'rotate(0deg)'; }
  } else {
    body.style.maxHeight  = '0';
    body.style.overflow   = 'hidden';
    body.style.opacity    = '0';
    body.style.display    = 'block';
    body.style.transition = 'max-height .38s cubic-bezier(.4,0,.2,1), opacity .3s ease';
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        body.style.maxHeight = body.scrollHeight + 'px';
        body.style.opacity   = '1';
      });
    });
    body.addEventListener('transitionend', () => {
      body.style.overflow  = 'visible';
      body.style.maxHeight = 'none';
    }, { once: true });
    if (arrow) { arrow.style.transition = 'transform .35s ease'; arrow.style.transform = 'rotate(180deg)'; }
  }
}

function renderSeriesPageInner() {
  const ROUND_ORDER = ['Premier tour','Demi-finales','Finales de conférence','Finales NBA'];
  const rounds = [...new Set(state.series.map(s => s.round))]
    .sort((a,b) => ROUND_ORDER.indexOf(a) - ROUND_ORDER.indexOf(b));

  return rounds.map(r => {
    const seriesInRound = state.series.filter(s => s.round === r);

    // Round-level status: finished if all done, live if any locked/live, upcoming otherwise
    const allFinished = seriesInRound.every(s => s.status === 'finished');
    const anyLive     = seriesInRound.some(s => {
      if (s.status === 'finished') return false;
      if (isLocked(s)) return true;
      return false;
    });
    const roundBadge = allFinished
      ? `<span class="badge badge-green">✓ Terminé</span>`
      : anyLive
        ? `<span class="badge badge-amber" style="gap:6px"><span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--amber);animation:pulse 1.4s infinite"></span>En cours</span>`
        : `<span class="badge badge-gray">À venir</span>`;

    // Count finished series
    const finishedCount = seriesInRound.filter(s => s.status === 'finished').length;
    const total = seriesInRound.length;

    const isOpen = seriesPageOpen[r] !== false; // open by default
    if (seriesPageOpen[r] === undefined) seriesPageOpen[r] = true;

    const seriesHTML = seriesInRound.map(s => {
      const allGames = state.games[s.id] || [];
      const preds = allPreds(s.id);
      const locked = isLocked(s);

      // Compute live score from finished games
      const finishedGames = allGames.filter(g => g.status === 'finished');
      let wins1 = 0, wins2 = 0;
      finishedGames.forEach(g => {
        if (g.winner === s.team1) wins1++;
        else if (g.winner === s.team2) wins2++;
      });

      // Series status label + badge
      let statusBadge = '';
      if (s.status === 'finished') {
        statusBadge = `<span class="badge badge-green">✓ Terminé</span>`;
      } else if (locked && finishedGames.length > 0) {
        statusBadge = `<span class="badge badge-amber" style="gap:5px"><span style="display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--amber);animation:pulse 1.4s infinite"></span>En cours</span>`;
      } else if (locked) {
        statusBadge = `<span class="badge badge-amber">🔒 Verrouillé</span>`;
      } else {
        statusBadge = `<span class="badge badge-green">Ouvert</span>`;
      }

      // Score display
      const showScore = finishedGames.length > 0;
      const scoreHTML = showScore
        ? `<div style="display:flex;align-items:center;gap:8px;margin:8px 0">
            <span style="font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:900;color:${wins1>wins2?'var(--green)':wins1<wins2?'var(--muted)':'var(--text)'}">${wins1}</span>
            <span style="font-size:14px;color:var(--muted);font-weight:700">–</span>
            <span style="font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:900;color:${wins2>wins1?'var(--green)':wins2<wins1?'var(--muted)':'var(--text)'}">${wins2}</span>
          </div>`
        : '';

      // Filter games to display:
      // - If finished: only show played games (hide unplayed ones)
      // - If in progress: show played + next upcoming (first non-finished)
      // - If upcoming: show nothing (no games played yet)
      let gamesToShow = [];
      if (s.status === 'finished') {
        gamesToShow = allGames.filter(g => g.status === 'finished');
      } else if (locked) {
        const nextGame = allGames.find(g => g.status !== 'finished');
        gamesToShow = [
          ...allGames.filter(g => g.status === 'finished'),
          ...(nextGame ? [nextGame] : [])
        ];
      }
      // sort by game_number
      gamesToShow.sort((a,b) => a.game_number - b.game_number);

      const gamesHTML = gamesToShow.length ? `
        <div style="margin-top:10px;border-top:1px solid var(--border);padding-top:8px">
          ${gamesToShow.map(g => `
            <div class="game-row">
              <span style="min-width:62px;font-size:12px;color:var(--muted)">Match ${g.game_number}</span>
              <span style="flex:1;font-size:12px;color:var(--muted)">${g.start_time ? fmtDate(g.start_time) : ''}</span>
              ${g.status === 'finished'
                ? `<span class="badge badge-green">🏆 ${g.winner}</span>`
                : isGameLocked(g)
                  ? `<span class="badge badge-amber">🔒 À venir</span>`
                  : `<span class="badge badge-gray">À venir</span>`}
            </div>`).join('')}
        </div>` : '';

      return `<div class="card" style="margin-top:8px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
          <span style="font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted)">
            ${s.conference && s.conference !== '—' ? s.conference + ' · ' : ''}${s.round}
          </span>
          ${statusBadge}
        </div>
        <div style="display:flex;align-items:center;gap:10px">
          <div style="flex:1">
            ${vsTeamHTML(s.team1)}
          </div>
          ${showScore
            ? scoreHTML
            : `<div class="vs-sep">VS</div>`}
          <div style="flex:1;display:flex;justify-content:flex-end">
            ${vsTeamHTML(s.team2, true)}
          </div>
        </div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:8px">
          <span class="badge badge-gray">${preds.length} pronostic(s)</span>
          ${s.start_time ? `<span class="badge badge-blue">⏰ ${fmtDate(s.start_time)}</span>` : ''}
        </div>
        ${gamesHTML}
      </div>`;
    }).join('');

    const safeId = r.replace(/\s+/g,'_').replace(/[^a-zA-Z0-9_]/g,'');
    return `
      <div style="margin:0 12px 6px">
        <button onclick="toggleSeriesRound('${r}')"
          style="width:100%;display:flex;align-items:center;justify-content:space-between;
                 background:var(--card);border:1px solid var(--border2);border-radius:16px;
                 padding:14px 16px;cursor:pointer;transition:border-color .2s,background .2s;text-align:left"
          onmouseover="this.style.background='var(--card2)';this.style.borderColor='rgba(255,255,255,0.2)'"
          onmouseout="this.style.background='var(--card)';this.style.borderColor='var(--border2)'">
          <div style="display:flex;align-items:center;gap:10px">
            <span style="font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:16px;
                         text-transform:uppercase;letter-spacing:0.05em;color:var(--text)">${r}</span>
            ${roundBadge}
            <span style="font-size:11px;color:var(--muted)">${finishedCount}/${total}</span>
          </div>
          <span id="sr-arrow-${safeId}" style="font-size:16px;color:var(--muted);
                       transform:rotate(${isOpen?'180':'0'}deg);display:inline-block">▼</span>
        </button>
        <div id="sr-body-${safeId}"
             style="margin-top:2px;${isOpen?'':'display:none;max-height:0;overflow:hidden;opacity:0'}">
          ${seriesHTML}
        </div>
      </div>`;
  }).join('');
}

function toggleCorrectSeries(sid) {
  const display = document.getElementById(`series-result-display-${sid}`);
  const edit = document.getElementById(`series-result-edit-${sid}`);

  const isEditing = edit.style.display !== 'none';

}

async function doCorrectSeriesResult(seriesId, sid) {
  const winner = document.getElementById(`res-w-${sid}`)?.value;
  const games = document.getElementById(`res-g-${sid}`)?.value;
  if (!winner || !games) return toast('Choisis le vainqueur et le nombre de matchs !');
  if (!confirm(`Corriger le résultat de la série en "${winner} en ${games}" ?`)) return;
  await setSeriesResult(seriesId, winner, Number(games));
}

function toggleCorrectGame(gidSafe) {
  const editDiv = document.getElementById(`game-edit-${gidSafe}`);
  if (!editDiv) return;
  editDiv.style.display = editDiv.style.display === 'none' ? 'flex' : 'none';
}

async function doCorrectGameResult(gameId, seriesId, gidSafe) {
  const winner = document.getElementById('gres-' + gidSafe)?.value;
  if (!winner) return toast('Choisis le vainqueur !');
  if (!confirm('Corriger le résultat de ce match en "' + winner + '" ?')) return;

  // 1. Mettre à jour le match
  const { error } = await sb.from('games').update({ winner, status: 'finished' }).eq('id', gameId);
  if (error) { console.error(error); return toast('Erreur mise à jour match'); }

  // 2. Recharger les matchs pour recalculer
  await loadSeries();

  const series = state.series.find(s => s.id === seriesId);
  if (!series) return;

  const allGames = state.games[seriesId] || [];
  const finishedGames = allGames.filter(g => g.status === 'finished');
  let wins1 = 0, wins2 = 0;
  finishedGames.forEach(g => {
    if (g.winner === series.team1) wins1++;
    else if (g.winner === series.team2) wins2++;
  });

  const newWinner = wins1 >= 4 ? series.team1 : wins2 >= 4 ? series.team2 : null;
  const newTotal  = newWinner ? wins1 + wins2 : null;

  if (newWinner) {
    // Une equipe a toujours (ou de nouveau) 4 victoires -> re-finir la serie
    const snapshotBefore = new Set(state.series.filter(s => s.status === 'finished').map(s => s.id));
    await sb.from('series').update({ series_winner: newWinner, series_games: newTotal, status: 'finished' }).eq('id', seriesId);
    try { await sb.rpc('recalculate_points', { p_series_id: seriesId }); } catch(e) { console.warn(e); }
    await loadSeries();
    await loadPredictions();
    computeLeaderboard();
    checkAndShowResultBanner(snapshotBefore);
    skipNextSeriesRealtime += 1;
    render();
    toast('Match corrige - serie mise a jour (' + newWinner + ' en ' + newTotal + ')');
  } else {
    // Plus personne n'a 4 victoires -> rouvrir la serie
    await sb.from('series').update({ series_winner: null, series_games: null, status: 'locked' }).eq('id', seriesId);
    try { await sb.rpc('recalculate_points', { p_series_id: seriesId }); } catch(e) { console.warn(e); }
    await loadSeries();
    await loadPredictions();
    computeLeaderboard();
    skipNextSeriesRealtime += 1;
    render();
    toast('Match corrige - serie repassee en cours (' + wins1 + '-' + wins2 + ')');
  }
}
async function doSetGameResult(gameId,seriesId,gidSafe) {
  const winner=document.getElementById(`gres-${gidSafe}`)?.value;
  if(!winner) return toast('Choisis le vainqueur !');
  await setGameResult(gameId,seriesId,winner);
}

}

async function doSaveSettings() {
  const updates = {};

  // ── Barème par round ──
  ['premier_tour', 'demi_finales', 'finales_conference', 'finales_nba'].forEach(key => {
    const pg = document.getElementById(`s-pts-game-${key}`);
    const ps = document.getElementById(`s-pts-series-${key}`);
    const pe = document.getElementById(`s-pts-exact-${key}`);

    if (pg) updates[`points_match_winner_${key}`] = parseInt(pg.value);
    if (ps) updates[`points_series_winner_${key}`] = parseInt(ps.value);
    if (pe) updates[`points_series_exact_${key}`] = parseInt(pe.value);
  });

  // ── MVP ──
  const am  = document.getElementById('s-actual-mvp');
  const mr1 = document.getElementById('s-mvp-r1');
  const msf = document.getElementById('s-mvp-sf');
  const mcf = document.getElementById('s-mvp-cf');
  const mfn = document.getElementById('s-mvp-fn');
  const ac  = document.getElementById('s-admin-code');

  const ac2 = document.getElementById('s-actual-champion');
  const cr1 = document.getElementById('s-champ-r1');
  const csf = document.getElementById('s-champ-sf');
  const ccf = document.getElementById('s-champ-cf');
  const cfn = document.getElementById('s-champ-fn');
  if (ac2) updates['actual_champion'] = ac2.value;
  if (cr1) updates['points_champion_premier_tour'] = parseInt(cr1.value);
  if (csf) updates['points_champion_demi_finales'] = parseInt(csf.value);
  if (ccf) updates['points_champion_finales_conference'] = parseInt(ccf.value);
  if (cfn) updates['points_champion_finales_nba'] = parseInt(cfn.value);

  if (am)  updates['actual_mvp'] = am.value;
  if (mr1) updates['points_mvp_premier_tour'] = parseInt(mr1.value);
  if (msf) updates['points_mvp_demi_finales'] = parseInt(msf.value);
  if (mcf) updates['points_mvp_finales_conference'] = parseInt(mcf.value);
  if (mfn) updates['points_mvp_finales_nba'] = parseInt(mfn.value);
  if (ac)  updates['admin_password'] = ac.value;

  await saveSettings(updates);
}

// Shortens team name for bracket display (max ~12 chars)
function shortTeamName(name) {
  const map = {
    'boston celtics':'Celtics','brooklyn nets':'Nets','new york knicks':'Knicks',
    'philadelphia 76ers':'Sixers','toronto raptors':'Raptors','chicago bulls':'Bulls',
    'cleveland cavaliers':'Cavaliers','detroit pistons':'Pistons','indiana pacers':'Pacers',
    'milwaukee bucks':'Bucks','atlanta hawks':'Hawks','charlotte hornets':'Hornets',
    'miami heat':'Heat','orlando magic':'Magic','washington wizards':'Wizards',
    'denver nuggets':'Nuggets','minnesota timberwolves':'T-Wolves','oklahoma city thunder':'Thunder',
    'portland trail blazers':'Blazers','utah jazz':'Jazz','golden state warriors':'Warriors',
    'los angeles clippers':'Clippers','los angeles lakers':'Lakers','phoenix suns':'Suns',
    'sacramento kings':'Kings','dallas mavericks':'Mavs','houston rockets':'Rockets',
    'memphis grizzlies':'Grizzlies','new orleans pelicans':'Pelicans','san antonio spurs':'Spurs',
  };
  return map[name.toLowerCase()] || name.split(' ').pop();
}

function bkTeamRow(name, score, isWinner, isLoser) {
  const logo = teamLogo(name);
  const cls = isWinner ? 'winner' : isLoser ? 'loser' : '';
  const scoreCls = isWinner ? 'bk-score winning' : 'bk-score';
  return `<div class="bk-team ${cls}">
    ${logo
      ? `<img class="bk-logo" src="${logo}" alt="" onerror="this.style.display='none'">`
      : `<div class="bk-logo-placeholder">🏀</div>`}
    <span class="bk-team-name">${shortTeamName(name)}</span>
    ${score !== null ? `<span class="${scoreCls}">${score}</span>` : ''}
  </div>`;
}

function bkMatchCard(series) {
  if (!series) {
    return `<div class="bk-tbd"><div class="bk-tbd-text">À déterminer</div></div>`;
  }

  const games = state.games[series.id] || [];
  const finishedGames = games.filter(g => g.status === 'finished');

  // Count wins per team
  let score1 = 0, score2 = 0;
  finishedGames.forEach(g => {
    if (g.winner === series.team1) score1++;
    else if (g.winner === series.team2) score2++;
  });

  const isFinished = series.status === 'finished';
  const hasStarted = isLocked(series);
  const isLive = !isFinished && hasStarted;

  const w = series.series_winner;
  const t1Win = isFinished && w === series.team1;
  const t1Lose = isFinished && w === series.team2;
  const t2Win = isFinished && w === series.team2;
  const t2Lose = isFinished && w === series.team1;

  let footer = '';
  if (isFinished) {
    footer = `<div class="bk-match-footer">✓ Terminé</div>`;
  } else if (isLive) {
    footer = `<div class="bk-match-footer live-dot">En cours</div>`;
  } else if (series.start_time) {
    const d = new Date(series.start_time);
    const label = d.toLocaleDateString('fr-FR',{day:'numeric',month:'short'});
    footer = `<div class="bk-match-footer">↗ ${label}</div>`;
  } else {
    footer = `<div class="bk-match-footer">À venir</div>`;
  }

  const showScore = isFinished || isLive;
  const s1 = showScore ? score1 : null;
  const s2 = showScore ? score2 : null;

  return `<div class="bk-match ${isFinished ? 'finished' : isLive ? 'live' : ''}">
    ${bkTeamRow(series.team1, s1, t1Win, t1Lose)}
    ${bkTeamRow(series.team2, s2, t2Win, t2Lose)}
    ${footer}
  </div>`;
}

function getSeriesByRoundConf(round, conf) {
  return state.series.filter(s =>
    s.round === round &&
    (conf === null || s.conference === conf || s.conference === '—')
  );
}

// Returns the series that produced a given winner (to chain bracket rounds)
function getNextSeries(winner, round) {
  if (!winner) return null;
  return state.series.find(s => s.round === round && (s.team1 === winner || s.team2 === winner)) || null;
}

function renderBracket() {
  // Gather series by round
  const r1East = state.series.filter(s => s.round === 'Premier tour' && s.conference === 'Est');
  const r1West = state.series.filter(s => s.round === 'Premier tour' && s.conference === 'Ouest');
  const sfEast = state.series.filter(s => s.round === 'Demi-finales' && s.conference === 'Est');
  const sfWest = state.series.filter(s => s.round === 'Demi-finales' && s.conference === 'Ouest');
  const cfEast = state.series.filter(s => s.round === 'Finales de conférence' && s.conference === 'Est');
  const cfWest = state.series.filter(s => s.round === 'Finales de conférence' && s.conference === 'Ouest');
  const finals = state.series.find(s => s.round === 'Finales NBA') || null;

  // Pad arrays to expected size with nulls
  const pad = (arr, n) => [...arr, ...Array(Math.max(0, n - arr.length)).fill(null)];

  const e1 = pad(r1East, 4);
  const w1 = pad(r1West, 4);
  const esf = pad(sfEast, 2);
  const wsf = pad(sfWest, 2);
  const ecf = pad(cfEast, 1);
  const wcf = pad(cfWest, 1);

  // Champion
  const champion = finals?.series_winner || null;

  // ── Build columns ────────────────────────────────────────────────
  // We render: EastR1 | EastSF | EastCF | Finals+Trophy | WestCF | WestSF | WestR1

  function col(seriesArr, label, justify='center') {
    const cards = seriesArr.map(s => bkMatchCard(s));
    // Space cards evenly
    const gaps = seriesArr.length;
    return `<div class="bracket-round">
      <div class="bracket-round-label">${label}</div>
      <div style="display:flex;flex-direction:column;gap:${gaps<=2?'32px':gaps<=4?'12px':'8px'};justify-content:${justify}">
        ${cards.join('')}
      </div>
    </div>`;
  }

  // Center column: ECF + Finals + WCF stacked
  const centerCol = `
    <div class="bracket-round" style="display:flex;flex-direction:column;align-items:center;gap:16px">
      <div class="bracket-round-label">Finales</div>
      <div style="display:flex;flex-direction:column;gap:12px;align-items:center">
        ${bkMatchCard(ecf[0])}
        ${bkMatchCard(finals)}
        ${bkMatchCard(wcf[0])}
      </div>
      ${champion ? `
        <div class="bk-trophy">
          <div class="bk-trophy-icon">🏆</div>
          <div class="bk-trophy-name">${shortTeamName(champion)}</div>
          <div class="bk-trophy-sub">Champions NBA 2026</div>
        </div>` : ''}
    </div>`;

  // Empty state
  if (!state.series.length) {
    return `<div class="empty"><span class="empty-icon">🗂</span>Aucune série configurée.<br>L'admin peut les ajouter depuis l'onglet Séries.</div>`;
  }

  return `
    <div style="padding:0 0 8px">
      <div class="bracket-hint">← Fais défiler horizontalement →</div>
      <div class="bracket-wrap">
        <div class="bracket-scroll">
          ${col(w1,   'Ouest — 1er tour')}
          ${col(wsf,  'Demi-finales Ouest')}
          ${centerCol}
          ${col(esf,  'Demi-finales Est')}
          ${col(e1,   'Est — 1er tour')}
        </div>
      </div>
    </div>
  `;
}

function openPlayerProfile(playerId) {
  const existing = document.getElementById('profile-overlay');
  if (existing) existing.remove();

  const player = getPlayer(playerId);
  if (!player) return;

  const lbEntry = state.leaderboard.find(p => p.id === playerId) || {};
  const playerPreds = state.predictions.filter(p => p.player_id === playerId);
  const mvpPreds = state.mvpPredictions.filter(p => p.player_id === playerId);

  // ── Stats globales
  const totalPts   = lbEntry.total_points || 0;
  const totalPreds = playerPreds.length;
  const seriesFin  = state.series.filter(s => s.status === 'finished');

  // Taux de réussite vainqueur série
  let winOk = 0, winTotal = 0;
  // Taux score exact
  let exactOk = 0;
  // Taux matchs individuels
  let gameOk = 0, gameTotal = 0;

  playerPreds.forEach(pred => {
    const s = state.series.find(x => x.id === pred.series_id);
    if (!s || s.status !== 'finished') return;
    winTotal++;
    if (pred.predicted_series_winner === s.series_winner) {
      winOk++;
      if (Number(pred.predicted_series_games) === Number(s.series_games)) exactOk++;
    }
    const sGames = state.games[s.id] || [];
    const gPreds = pred.game_predictions || [];
    sGames.forEach(g => {
      if (g.status !== 'finished' || !g.winner) return;
      gameTotal++;
      const gp = gPreds.find(p => Number(p.game_number) === Number(g.game_number));
      if (gp && gp.predicted_winner === g.winner) gameOk++;
    });
  });

  const pctWin  = winTotal  ? Math.round(winOk  / winTotal  * 100) : null;
  const pctExact= winTotal  ? Math.round(exactOk/ winTotal  * 100) : null;
  const pctGame = gameTotal ? Math.round(gameOk / gameTotal * 100) : null;

  // ── Rang dans le leaderboard
  const rank = state.leaderboard.findIndex(p => p.id === playerId) + 1;

  // ── Séries avec pronostic
  const seriesRows = seriesFin.map(s => {
    const pred = playerPreds.find(p => p.series_id === s.id);
    if (!pred) return `
      <div class="profile-series-row">
        <div class="profile-series-icon" style="background:rgba(255,255,255,0.05)">—</div>
        <div style="flex:1">
          <div class="profile-series-teams">${s.team1} vs ${s.team2}</div>
          <div class="profile-series-pred" style="color:var(--muted)">Pas de pronostic</div>
        </div>
        <div class="profile-pts-badge" style="color:var(--muted)">—</div>
      </div>`;

    const winOk = pred.predicted_series_winner === s.series_winner;
    const exactOk = winOk && Number(pred.predicted_series_games) === Number(s.series_games);
    // Recompute from settings (same logic as computeLeaderboard, avoids stale DB values)
    const roundPoints = getRoundPoints(s.round);
    const _ptsSW = roundPoints.series;
    const _ptsSE = roundPoints.exact;
    const _ptsMW = roundPoints.match;
    let ptsSW  = winOk ? _ptsSW : 0;
    let ptsSE  = exactOk ? _ptsSE : 0;
    const sGamesForPts = state.games[s.id] || [];
    const gPredsForPts = pred.game_predictions || [];
    let ptsGame = 0;
    sGamesForPts.forEach(g => {
      if (g.status !== 'finished' || !g.winner) return;
      const gp = gPredsForPts.find(p => Number(p.game_number) === Number(g.game_number));
      if (gp && gp.predicted_winner === g.winner) ptsGame += _ptsMW;
    });

    // Double down : si actif et vainqueur correct → tout est doublé
    const dd = state.doubleDowns.find(d => d.player_id === playerId && d.series_id === s.id);
    const ddActive = !!dd && winOk;
    if (ddActive) { ptsSW *= 2; ptsSE *= 2; ptsGame *= 2; }

    const pts = ptsSW + ptsSE + ptsGame;

    const icon = exactOk ? '🎯' : winOk ? '✓' : '✗';
    const iconBg = exactOk
      ? 'rgba(29,185,84,0.15)' : winOk
      ? 'rgba(245,158,11,0.15)' : 'rgba(232,66,42,0.1)';
    const iconColor = exactOk
      ? 'var(--green)' : winOk
      ? 'var(--amber)' : 'var(--accent)';

    const chips = [];
    if (ptsSW > 0) chips.push(`<span style="color:var(--accent)">+${ptsSW} série</span>`);
    if (ptsSE > 0) chips.push(`<span style="color:var(--green)">+${ptsSE} exact</span>`);
    if (ptsGame > 0) chips.push(`<span style="color:var(--blue)">+${ptsGame} matchs</span>`);
    if (ddActive) chips.push(`<span style="color:var(--gold)">🎲 doublé</span>`);
    if (pts === 0) chips.push(`<span style="color:var(--muted)">0 pt</span>`);

    return `
      <div class="profile-series-row">
        <div class="profile-series-icon" style="background:${iconBg};color:${iconColor};font-size:18px">${icon}</div>
        <div style="flex:1;min-width:0">
          <div class="profile-series-teams" style="display:flex;align-items:center;gap:6px">
            ${s.team1} vs ${s.team2}
            ${dd ? `<span class="dd-badge" style="font-size:9px;padding:2px 6px">🎲</span>` : ''}
          </div>
          <div class="profile-series-pred">
            ${pred.predicted_series_winner} en ${pred.predicted_series_games}
            <span style="color:var(--muted)"> · réel : ${s.series_winner} en ${s.series_games}</span>
          </div>
          <div class="profile-series-result">${chips.join(' · ')}</div>
        </div>
        <div class="profile-pts-badge" style="color:${pts>0?(ddActive?'var(--gold)':'var(--gold)'):'var(--muted)'}">${pts>0?'+'+pts:'—'}</div>
      </div>`;
  }).join('');

  // ── MVP preds — visibles uniquement si le tour est verrouillé (isMvpLocked)
  const isViewingOwnProfile = playerId === state.currentPlayer?.id;
  const actualMvp = String(state.settings['actual_mvp'] ?? '').trim().toLowerCase();

  const mvpRowsArr = ['Premier tour','Demi-finales','Finales de conférence','Finales NBA'].map(round => {
    const mp = mvpPreds.find(p => p.playoff_round === round);
    const locked = isMvpLocked(round);
    const visible = isViewingOwnProfile || locked;

    if (!mp) {
      // Pas de pronostic du tout pour ce tour
      return `
        <div class="profile-series-row">
          <div class="profile-series-icon" style="width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.05);display:flex;align-items:center;justify-content:center;font-size:16px">👑</div>
          <div style="flex:1">
            <div style="font-size:11px;color:var(--muted)">${round}</div>
            <div style="font-size:13px;color:var(--muted);margin-top:2px">Aucun pronostic</div>
          </div>
          ${locked ? '' : '<span class="badge badge-blue">Ouvert</span>'}
        </div>`;
    }

    if (!visible) {
      // Tour pas encore verrouillé et ce n'est pas notre propre profil → caché
      return `
        <div class="profile-series-row">
          <div class="profile-series-icon" style="width:36px;height:36px;border-radius:50%;background:rgba(245,158,11,0.1);display:flex;align-items:center;justify-content:center;font-size:16px">🔒</div>
          <div style="flex:1">
            <div style="font-size:11px;color:var(--muted)">${round}</div>
            <div style="font-size:13px;color:var(--muted);margin-top:2px">Révélé au début du tour</div>
          </div>
          <span class="badge badge-amber">🔒</span>
        </div>`;
    }

    const hit = actualMvp && mp.predicted_mvp?.toLowerCase() === actualMvp;
    const candidate = MVP_CANDIDATES.find(c => c.name === mp.predicted_mvp);
    return `
      <div class="profile-series-row">
        <div class="profile-series-icon" style="width:36px;height:36px;border-radius:50%;overflow:hidden;background:rgba(255,255,255,0.06)">
          ${candidate
            ? `<img src="${playerPhoto(candidate.espnId)}" style="width:100%;height:100%;object-fit:cover;object-position:top" onerror="this.style.display='none'">`
            : `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:16px">👑</div>`}
        </div>
        <div style="flex:1">
          <div style="font-size:13px;font-weight:600">${mp.predicted_mvp}</div>
          <div style="font-size:11px;color:var(--muted)">${round}</div>
        </div>
        <span class="badge ${actualMvp?(hit?'badge-green':'badge-red'):'badge-gray'}">${actualMvp?(hit?'✓ Correct':'✗ Raté'):'En attente'}</span>
      </div>`;
  });

  const mvpRows = mvpRowsArr.join('');

  // ── Accuracy bars
  function accBar(pct, color) {
    if (pct === null) return '<div style="font-size:12px;color:var(--muted);padding:0 20px 12px">Pas encore de données</div>';
    return `
      <div style="padding:0 20px 14px">
        <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:6px">
          <span style="color:var(--muted)">${pct}%</span>
        </div>
        <div class="profile-accuracy-bar">
          <div class="profile-accuracy-fill" style="width:${pct}%;background:${color}"></div>
        </div>
      </div>`;
  }

  const html = `
    <div class="profile-overlay" id="profile-overlay" onclick="handleProfileOverlayClick(event)">
      <div class="profile-sheet" onclick="event.stopPropagation()">

        <div class="profile-hero">
          <div class="profile-avatar" style="background:${player.avatar_color}22;color:${player.avatar_color};overflow:hidden;position:relative;cursor:${playerId === state.currentPlayer?.id ? 'pointer' : 'default'}" ${playerId === state.currentPlayer?.id ? `onclick="openAvatarModal('${playerId}', ${!!player.avatar_url})" title="Modifier ma photo"` : ''}>
            ${player.avatar_url
              ? `<img src="${player.avatar_url}" style="width:100%;height:100%;object-fit:cover" onerror="this.style.display='none'">`
              : initials(player.name)}
            ${playerId === state.currentPlayer?.id ? `<div style="position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,0.55);font-size:9px;text-align:center;padding:3px 0;letter-spacing:0.04em;font-weight:700;color:#fff">✏️ PHOTO</div>` : ''}
          </div>
          <div>
            <div class="profile-name">${player.name}</div>
            <div class="profile-sub">Rang #${rank} · ${totalPreds}/${state.series.length} série(s) pronostiquée(s)</div>
          </div>
          <div class="profile-close" onclick="closePlayerProfile()">✕</div>
        </div>
        
        <div class="profile-stats-grid">
          <div class="profile-stat">
            <div class="profile-stat-num" style="color:var(--gold)">${totalPts}</div>
            <div class="profile-stat-lbl">Points</div>
          </div>
          <div class="profile-stat">
            <div class="profile-stat-num" style="color:var(--accent)">${winTotal ? winOk + '/' + winTotal : '—'}</div>
            <div class="profile-stat-lbl">Séries OK</div>
          </div>
          <div class="profile-stat">
            <div class="profile-stat-num" style="color:var(--green)">${winTotal ? exactOk + '/' + winTotal : '—'}</div>
            <div class="profile-stat-lbl">Exacts</div>
          </div>
          <div class="profile-stat">
            <div class="profile-stat-num" style="color:var(--blue)">${gameTotal ? gameOk + '/' + gameTotal : '—'}</div>
            <div class="profile-stat-lbl">Matchs</div>
          </div>
        </div>
        

        <div class="profile-section-hd">Précision</div>
        <div style="padding:0 20px 4px;font-size:11px;color:var(--muted);margin-bottom:4px">Vainqueur de série</div>
        ${accBar(pctWin, 'var(--accent)')}
        <div style="padding:0 20px 4px;font-size:11px;color:var(--muted);margin-bottom:4px">Score exact</div>
        ${accBar(pctExact, 'var(--green)')}
        <div style="padding:0 20px 4px;font-size:11px;color:var(--muted);margin-bottom:4px">Matchs individuels</div>
        ${accBar(pctGame, 'var(--blue)')}

        <div class="profile-section-hd">Séries terminées</div>
        ${seriesFin.length ? seriesRows : '<div style="padding:12px 20px;font-size:13px;color:var(--muted)">Aucune série terminée.</div>'}

        <div class="profile-section-hd">Pronostic Champion</div>
        ${(() => {
          const champPreds = state.championPredictions.filter(p => p.player_id === playerId);
          const actualChampion = String(state.settings['actual_champion'] ?? '').trim();
          if (!champPreds.length) return '<div style="padding:12px 20px;font-size:13px;color:var(--muted)">Aucun pronostic champion.</div>';
          return champPreds.map(cp => {
            const logo = teamLogo(cp.predicted_champion);
            const hit = actualChampion && cp.predicted_champion.toLowerCase() === actualChampion.toLowerCase();
            return `<div class="profile-series-row">

// FIX 1 & 3: clic joueur = sélection + sauvegarde immédiate, sans recréer le DOM
async function pickMvpDirect(e, round, name, espnId) {
  e.stopPropagation();
  // Highlight sélectionné en DOM pur, sans re-render
  document.querySelectorAll('#mvp-grid .mvp-card').forEach(el => el.classList.remove('selected'));
  document.getElementById('mvpc-' + espnId)?.classList.add('selected');
  // Désactiver "Autre"
  document.getElementById('mvp-other-box')?.classList.remove('active');
  document.getElementById('mvp-other-input') && (document.getElementById('mvp-other-input').value = '');
  // Sauvegarder directement
  closeMvpPicker();
  await saveMvpPrediction(round, name);
}

// FIX 2: oninput ne recrée jamais le DOM
function onMvpOtherInput(val) {
  const box = document.getElementById('mvp-other-box');
  if (box) box.classList.toggle('active', val.length > 0);
  // Désélectionner les cartes joueurs
  if (val.length > 0) {
    document.querySelectorAll('#mvp-grid .mvp-card').forEach(el => el.classList.remove('selected'));
  }
}

async function confirmMvpOther(round) {
  const val = document.getElementById('mvp-other-input')?.value.trim();
  if (!val) return toast('Entre un nom de joueur !');
  closeMvpPicker();
  await saveMvpPrediction(round, val);
}

function handleMvpOverlayClick(e) {
  if (e.target.id === 'mvp-overlay') closeMvpPicker();
}

  await loadPlayers();

    state.currentPlayer = state.players.find(p => p.id === playerId) || state.currentPlayer;

    localStorage.setItem('nba26_player', JSON.stringify(state.currentPlayer));
  }
  computeLeaderboard();
  toast('✅ Photo supprimée');
  closePlayerProfile();
  render();

function urlBase64ToUint8Array(base64String) {
  const padding = '='.repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
  const rawData = atob(base64);
  return Uint8Array.from([...rawData].map(c => c.charCodeAt(0)));
}

  if (!el) return;
  const { data } = await sb.from('push_subscriptions').select('player_id, created_at');
  if (!data?.length) { el.innerHTML = '<div style="color:var(--muted);font-size:13px">Aucun abonné.</div>'; return; }
  const counts = {};
  data.forEach(r => { counts[r.player_id] = (counts[r.player_id] || 0) + 1; });
  el.innerHTML = Object.entries(counts).map(([pid, n]) => {
    const p = getPlayer(pid);
    if (!p) return '';
    return `<div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border)">
      ${avatarImg(p, '28px')}
      <span style="flex:1;font-size:13px;font-weight:600">${p.name}</span>
      <span style="font-size:11px;color:var(--muted)">${n} appareil${n>1?'s':''}</span>
      <span style="font-size:16px">🔔</span>
    </div>`;
  }).join('');
}

async function sendTestNotification() {
  if (!state.currentPlayer) return toast('Connecte-toi d\'abord');
  const status = await getPushStatus();
  if (status !== 'on') return toast('Active les notifications d\'abord (bouton 🔔)');
  try {
    const reg = await navigator.serviceWorker.ready;
    // Simule une notification locale via le service worker
    await reg.showNotification('🏀 Test NBA Playoffs', {
      body: 'Les notifications fonctionnent parfaitement ! 🎉',
      icon: './icon-192.png',
      badge: './icon-192.png',
      tag: 'test-notif',
      vibrate: [200, 100, 200],
    });
    toast('✅ Notification envoyée !');
  } catch(e) {
    console.error(e);
    toast('❌ Erreur : ' + e.message);
  }
}

// ── BOUTON CLOCHE HEADER ──
async function togglePushFromHeader() {
  const status = await getPushStatus();
  if (status === 'on') {
    await unregisterPushNotifications();
  } else if (status === 'denied') {
    toast('🔕 Notifications bloquées — autorise-les dans les paramètres du navigateur');
  } else {
    await registerPushNotifications();
  }
  updateHeaderPushBtn();
}

async function updateHeaderPushBtn() {
  const status = await getPushStatus();
  if (status === state.pushStatus) return; // rien n'a changé, pas de flash
  state.pushStatus = status;
  // Patch direct du DOM sans re-render complet
  const icon = document.getElementById('header-push-icon');
  if (!icon) return;
  if (status === 'on') {
    icon.textContent = '🔔';
    icon.style.opacity = '1';
  } else if (status === 'denied') {
    icon.textContent = '🔕';
    icon.style.opacity = '0.4';
  } else {
    icon.textContent = '🔕';
    icon.style.opacity = '0.6';
  }
}

async function showPushBanner() {
  if (!('serviceWorker' in navigator) || !('PushManager' in window)) return;
  if (!state.currentPlayer) return;
  // Ne pas montrer si déjà abonné
  try {
    const reg = await navigator.serviceWorker.register(SW_URL);
    await navigator.serviceWorker.ready;
    const existing = await reg.pushManager.getSubscription();
    if (existing) { await _savePushSub(existing); return; }
  } catch(e) { return; }
  // Ne pas montrer si permission déjà refusée
  if (Notification.permission === 'denied') return;
  // Ne pas montrer si déjà vue et ignorée récemment (7 jours)
  const lastDismiss = localStorage.getItem('nba26_push_dismissed');
  if (lastDismiss && Date.now() - Number(lastDismiss) < 1 * 24 * 3600 * 1000) return;
  // Afficher la bannière
  const existing_banner = document.getElementById('push-banner');
  if (existing_banner) return;
  const banner = document.createElement('div');
  banner.id = 'push-banner';
  banner.innerHTML = `
    <div id="push-banner-icon">🔔</div>
    <div id="push-banner-text">
      Reçois les résultats en temps réel
      <div id="push-banner-sub">Rappels avant les matchs & résultats de séries</div>
    </div>
    <button id="push-banner-btn" onclick="activatePushFromBanner()">Activer</button>
    <button id="push-banner-close" onclick="dismissPushBanner()">✕</button>
  `;
  document.body.appendChild(banner);
}

function dismissPushBanner() {
  document.getElementById('push-banner')?.remove();
  localStorage.setItem('nba26_push_dismissed', Date.now().toString());
}

async function activatePushFromBanner() {
  document.getElementById('push-banner')?.remove();
  await registerPushNotifications();
}

async function registerPushNotifications() {
  if (!('serviceWorker' in navigator) || !('PushManager' in window)) return;
  if (!state.currentPlayer) return;

  try {
    const reg = await navigator.serviceWorker.register(SW_URL);
    await navigator.serviceWorker.ready;

    const existing = await reg.pushManager.getSubscription();
    if (existing) {
      await _savePushSub(existing);
      await updateHeaderPushBtn();
      return;
    }

    const perm = await Notification.requestPermission();
    if (perm !== 'granted') {
      await updateHeaderPushBtn();
      return;
    }

    const sub = await reg.pushManager.subscribe({
      userVisibleOnly: true,
      applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY),
    });

    await _savePushSub(sub);
    await updateHeaderPushBtn();
    toast('🔔 Notifications activées !');
    loadPushSubsList();
  } catch (e) {
    console.warn('Push registration failed:', e);
  }
}

async function _savePushSub(sub) {
  if (!state.currentPlayer) return;
  const subJson = sub.toJSON();
  const endpoint = subJson.endpoint;
  // Vérifier si cette subscription existe déjà pour ce joueur
  const { data: existing } = await sb
    .from('push_subscriptions')
    .select('id')
    .eq('player_id', state.currentPlayer.id)
    .eq('subscription->>endpoint', endpoint)
    .maybeSingle();
  if (existing) {
    // Mettre à jour les clés (peuvent changer)
    await sb.from('push_subscriptions')
      .update({ subscription: subJson })
      .eq('id', existing.id);
  } else {
    await sb.from('push_subscriptions').insert({
      player_id: state.currentPlayer.id,
      subscription: subJson,
    });
  }
}

async function unregisterPushNotifications() {
  if (!('serviceWorker' in navigator)) return;
  const reg = await navigator.serviceWorker.getRegistration(SW_URL);
  if (!reg) return;
  const sub = await reg.pushManager.getSubscription();
  if (sub) {
    // Supprimer de Supabase
    await sb.from('push_subscriptions')
      .delete()
      .eq('player_id', state.currentPlayer?.id)
      .eq('subscription->>endpoint', sub.endpoint);
    await sub.unsubscribe();
  }
  _updatePushBtn();
  toast('🔕 Notifications désactivées');
  loadPushSubsList(); // Rafraîchit la liste admin en temps réel
}

async function getPushStatus() {
  if (!('serviceWorker' in navigator) || !('PushManager' in window)) return 'unsupported';
  const perm = Notification.permission;
  if (perm === 'denied') return 'denied';
  const reg = await navigator.serviceWorker.getRegistration(SW_URL);
  if (!reg) return 'off';
  const sub = await reg.pushManager.getSubscription();
  return sub ? 'on' : 'off';
}

async function _updatePushBtn() {
  const btn = document.getElementById('push-toggle-btn');
  if (!btn) return;
  const status = await getPushStatus();
  if (status === 'unsupported') {
    btn.style.display = 'none'; return;
  }
  if (status === 'denied') {
    btn.textContent = '🔕 Notifications bloquées';
    btn.style.opacity = '0.5';
    btn.onclick = () => toast('Autorise les notifications dans les paramètres de ton navigateur');
    return;
  }
  if (status === 'on') {
    btn.textContent = '🔔 Notifications activées';
    btn.style.color = 'var(--green)';
    btn.onclick = unregisterPushNotifications;
  } else {
    btn.textContent = '🔕 Activer les notifications';
    btn.style.color = 'var(--muted)';
    btn.onclick = registerPushNotifications;
  }
}

init();
</script>
