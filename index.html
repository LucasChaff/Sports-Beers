<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>NBA Playoffs 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#05050a;
  --surface:#0c0c14;
  --card:#11111c;
  --card2:#16162a;
  --border:rgba(255,255,255,0.06);
  --border2:rgba(255,255,255,0.12);
  --text:#f0f2ff;
  --muted:rgba(200,205,240,0.5);
  --dim:rgba(200,205,240,0.25);
  --accent:#e8422a;
  --accent2:#ff7a5c;
  --gold:#f5c518;
  --gold2:#ffd966;
  --blue:#3d7fff;
  --green:#1db954;
  --red:#e8422a;
  --amber:#f59e0b;
  --r:12px;
  --r2:20px;
}
body{
  font-family:'Barlow',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}
/* ── COURT TEXTURE BG ── */
body::before{
  content:'';
  position:fixed;inset:0;
  background:
    radial-gradient(ellipse 70% 40% at 50% -10%,rgba(232,66,42,0.18) 0%,transparent 60%),
    radial-gradient(ellipse 40% 30% at 100% 60%,rgba(61,127,255,0.10) 0%,transparent 60%),
    repeating-linear-gradient(90deg,rgba(255,255,255,0.012) 0px,rgba(255,255,255,0.012) 1px,transparent 1px,transparent 60px),
    repeating-linear-gradient(0deg,rgba(255,255,255,0.012) 0px,rgba(255,255,255,0.012) 1px,transparent 1px,transparent 60px);
  pointer-events:none;z-index:0;
}
#root{position:relative;z-index:1}

/* ── LAYOUT ── */
#app{max-width:480px;margin:0 auto;padding:0 0 5rem}
.page{display:none}
.page.active{display:block;animation:fadeUp .25s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* ── HEADER ── */
.app-header{
  position:sticky;top:0;z-index:80;
  background:rgba(5,5,10,0.85);
  backdrop-filter:blur(24px) saturate(1.4);
  -webkit-backdrop-filter:blur(24px) saturate(1.4);
  border-bottom:1px solid var(--border2);
}
.header-top{
  display:flex;align-items:center;gap:10px;
  padding:14px 16px 10px;
}
.logo-mark{
  width:36px;height:36px;border-radius:10px;flex-shrink:0;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:flex;align-items:center;justify-content:center;
  font-size:18px;
  box-shadow:0 0 20px rgba(232,66,42,0.4);
}
.header-wordmark{
  font-family:'Barlow Condensed',sans-serif;
  font-weight:900;font-size:22px;letter-spacing:0.04em;line-height:1;
  text-transform:uppercase;
}
.header-wordmark span{color:var(--accent)}
.header-season{font-size:10px;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;margin-top:1px}
.header-player-btn{
  margin-left:auto;display:flex;align-items:center;gap:7px;
  background:rgba(255,255,255,0.07);border:1px solid var(--border2);
  border-radius:999px;padding:6px 10px 6px 8px;
  cursor:pointer;transition:all .2s;font-size:12px;font-weight:600;
  color:var(--text);
}
.header-player-btn:hover{background:rgba(255,255,255,0.12);border-color:rgba(255,255,255,0.2)}
.player-dot{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700}

/* ── NAV BAR ── */
.nav-bar{display:flex;border-bottom:1px solid var(--border);padding:0 4px}
.nav-item{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:9px 4px 8px;
  font-family:'Barlow Condensed',sans-serif;font-weight:700;
  font-size:12px;letter-spacing:0.06em;text-transform:uppercase;
  color:var(--muted);border:none;background:none;cursor:pointer;
  border-bottom:2px solid transparent;margin-bottom:-1px;
  transition:all .2s;
}
.nav-item.active{color:var(--accent);border-bottom-color:var(--accent)}
.nav-icon{font-size:14px;line-height:1}

/* ── SECTION LABEL ── */
.section-label{
  font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:11px;
  letter-spacing:0.16em;text-transform:uppercase;color:var(--muted);
  padding:1.5rem 16px 8px;display:flex;align-items:center;gap:8px;
}
.section-label::after{content:'';flex:1;height:1px;background:var(--border)}

/* ── CARDS ── */
.card{
  margin:0 12px 10px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--r2);
  padding:14px 16px;
  transition:border-color .2s,transform .18s;
  position:relative;overflow:hidden;
}
.card::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,0.03) 0%,transparent 60%);
  pointer-events:none;border-radius:inherit;
}
.card:hover{border-color:var(--border2)}

/* ── FORMS ── */
input,select,textarea{
  width:100%;background:rgba(255,255,255,0.05);
  border:1.5px solid var(--border2);border-radius:var(--r);
  color:var(--text);font-family:'Barlow',sans-serif;font-size:14px;
  padding:10px 12px;outline:none;transition:border-color .2s;
}
input:focus,select:focus{border-color:var(--accent);background:rgba(255,255,255,0.07)}
select option{background:#11111c}
label{font-size:11px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:5px}

/* ── BUTTONS ── */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  border:1.5px solid var(--border2);border-radius:var(--r);
  background:rgba(255,255,255,0.04);color:var(--text);
  font-family:'Barlow',sans-serif;font-size:14px;font-weight:600;
  padding:11px 18px;cursor:pointer;transition:all .2s;white-space:nowrap;
}
.btn:hover{background:rgba(255,255,255,0.09);border-color:rgba(255,255,255,0.22);transform:translateY(-1px)}
.btn:active{transform:translateY(0) scale(.98)}
.btn-primary{
  background:linear-gradient(135deg,var(--accent) 0%,#c0301a 100%);
  border-color:transparent;color:#fff;
  box-shadow:0 4px 20px rgba(232,66,42,0.35);
}
.btn-primary:hover{box-shadow:0 6px 28px rgba(232,66,42,0.5)}
.btn-gold{
  background:linear-gradient(135deg,var(--gold),#e8a800);
  border-color:transparent;color:#1a1000;font-weight:700;
}
.btn-sm{font-size:12px;padding:7px 13px;border-radius:10px}
.btn-block{width:100%}
.btn-ghost{border-color:transparent;color:var(--muted);background:transparent}
.btn-ghost:hover{color:var(--text);background:rgba(255,255,255,0.05);border-color:var(--border2)}
.btn-danger{border-color:rgba(232,66,42,0.3);color:var(--red)}
.btn-danger:hover{background:rgba(232,66,42,0.1)}

/* ── BADGES ── */
.badge{
  display:inline-flex;align-items:center;gap:4px;
  font-size:10px;font-weight:700;letter-spacing:0.05em;
  padding:3px 9px;border-radius:999px;border:1px solid;
}
.badge-red{background:rgba(232,66,42,0.15);border-color:rgba(232,66,42,0.35);color:#ff8068}
.badge-green{background:rgba(29,185,84,0.12);border-color:rgba(29,185,84,0.28);color:#1db954}
.badge-amber{background:rgba(245,158,11,0.12);border-color:rgba(245,158,11,0.28);color:var(--amber)}
.badge-blue{background:rgba(61,127,255,0.12);border-color:rgba(61,127,255,0.28);color:#6aa3ff}
.badge-gray{background:rgba(255,255,255,0.06);border-color:var(--border2);color:var(--muted)}
.badge-gold{background:rgba(245,197,24,0.15);border-color:rgba(245,197,24,0.35);color:var(--gold)}

/* ── LEADERBOARD ── */
.lb-podium{
  margin:0 12px 10px;
  background:linear-gradient(135deg,rgba(245,197,24,0.08),rgba(232,66,42,0.05));
  border:1px solid rgba(245,197,24,0.18);border-radius:var(--r2);
  padding:20px 16px 16px;position:relative;overflow:hidden;
}
.lb-podium::before{
  content:'🏆';position:absolute;right:16px;top:12px;
  font-size:64px;opacity:0.07;line-height:1;
}
.lb-podium-rank{
  font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:800;
  letter-spacing:0.2em;text-transform:uppercase;color:var(--gold);margin-bottom:14px;
}
.lb-podium-inner{display:flex;align-items:center;gap:12px}
.lb-podium-avatar{
  width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:800;flex-shrink:0;
  border:2px solid var(--gold);box-shadow:0 0 20px rgba(245,197,24,0.3);
}
.lb-podium-name{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:900;line-height:1;text-transform:uppercase}
.lb-podium-sub{font-size:12px;color:var(--muted);margin-top:3px}
.lb-podium-pts{
  margin-left:auto;text-align:right;
  font-family:'Barlow Condensed',sans-serif;font-size:52px;font-weight:900;
  color:var(--gold);line-height:1;
}
.lb-podium-pts-label{font-size:11px;color:var(--gold);opacity:0.7;letter-spacing:0.1em;text-transform:uppercase}

.lb-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.lb-row:last-child{border-bottom:none}
.lb-rank-num{
  font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;
  min-width:26px;text-align:center;color:var(--muted);
}
.lb-avatar-sm{
  width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:800;flex-shrink:0;
}
.lb-name{font-size:15px;font-weight:600;flex:1}
.lb-pts-sm{font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:800;color:var(--accent)}
.lb-pts-lbl{font-size:10px;color:var(--muted);letter-spacing:0.08em}

/* ── DETAIL TABLE ── */
.detail-table{width:100%;border-collapse:collapse;font-size:12px}
.detail-table th{
  font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;letter-spacing:0.08em;
  text-transform:uppercase;color:var(--muted);padding:4px 8px;text-align:right;
}
.detail-table th:first-child{text-align:left}
.detail-table td{padding:6px 8px;border-top:1px solid var(--border);text-align:right}
.detail-table td:first-child{text-align:left;font-weight:600;color:var(--text)}

/* ── VS CARD ── */
.vs-block{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.vs-team{flex:1;display:flex;flex-direction:column;align-items:flex-start;gap:4px}
.vs-team.right{align-items:flex-end}
.vs-team-logo{width:44px;height:44px;object-fit:contain;filter:drop-shadow(0 2px 8px rgba(0,0,0,0.4))}
.vs-team-name{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;text-transform:uppercase;line-height:1.1}
.vs-sep{
  width:36px;height:36px;border-radius:50%;flex-shrink:0;
  background:rgba(255,255,255,0.06);border:1px solid var(--border2);
  display:flex;align-items:center;justify-content:center;
  font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:800;
  color:var(--muted);letter-spacing:0.05em;
}

/* ── TEAM PICKER ── */
.team-picker{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:6px}
.team-btn{
  padding:12px 8px;border-radius:12px;
  border:1.5px solid var(--border2);background:rgba(255,255,255,0.03);
  color:var(--muted);font-family:'Barlow Condensed',sans-serif;
  font-size:16px;font-weight:700;text-transform:uppercase;letter-spacing:0.03em;
  cursor:pointer;transition:all .18s;text-align:center;
}
.team-btn.selected{background:rgba(61,127,255,0.18);border-color:var(--blue);color:#9ec4ff;box-shadow:0 0 20px rgba(61,127,255,0.2)}
.team-btn:hover:not(.selected){border-color:rgba(255,255,255,0.2);color:var(--text)}

/* ── GAMES PICKER ── */
.games-row{display:flex;gap:6px;margin-top:6px}
.games-btn{
  flex:1;padding:10px 4px;border-radius:10px;
  border:1.5px solid var(--border2);background:rgba(255,255,255,0.03);
  color:var(--muted);font-family:'Barlow Condensed',sans-serif;
  font-size:15px;font-weight:700;cursor:pointer;text-align:center;
  transition:all .18s;
}
.games-btn.selected{background:linear-gradient(135deg,var(--accent),#c0301a);border-color:transparent;color:#fff;box-shadow:0 4px 16px rgba(232,66,42,0.35)}
.games-btn:hover:not(.selected){border-color:rgba(255,255,255,0.2);color:var(--text)}

/* ── MY PRED SUMMARY ── */
.my-pred-bar{
  display:flex;align-items:center;gap:10px;
  background:rgba(61,127,255,0.08);border:1px solid rgba(61,127,255,0.2);
  border-radius:12px;padding:10px 12px;margin-top:10px;
}
.my-pred-icon{font-size:16px}
.my-pred-text{font-size:13px;font-weight:600;flex:1}
.my-pred-sub{font-size:11px;color:var(--muted)}

/* ── REVEAL ROW ── */
.reveal-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
.reveal-row:last-child{border-bottom:none}
.reveal-av{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}

/* ── PTS CHIPS ── */
.pts-chips{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px}
.pts-chip{font-size:11px;padding:3px 9px;border-radius:999px;border:1px solid var(--border);color:var(--muted);background:rgba(255,255,255,0.05)}
.pts-chip.hit{background:rgba(29,185,84,0.12);border-color:rgba(29,185,84,0.28);color:var(--green)}

/* ── RESULT BOX ── */
.result-box{
  background:rgba(29,185,84,0.08);border:1px solid rgba(29,185,84,0.2);
  border-radius:12px;padding:10px 14px;margin-bottom:12px;
  display:flex;align-items:center;gap:10px;
}
.result-box-trophy{font-size:18px}
.result-box-text{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:800;text-transform:uppercase;color:var(--green)}

/* ── ONBOARD ── */
.onboard-screen{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  padding:24px;position:relative;
}
.onboard-screen::before{
  content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse 80% 50% at 50% 0%,rgba(232,66,42,0.2),transparent 60%);
  pointer-events:none;
}
.onboard-box{
  width:100%;max-width:390px;
  background:var(--card);border:1px solid var(--border2);
  border-radius:28px;padding:28px 24px;position:relative;z-index:1;
  box-shadow:0 30px 80px rgba(0,0,0,0.6);
}
.onboard-hero{text-align:center;margin-bottom:28px}
.onboard-ball{font-size:56px;line-height:1;margin-bottom:12px;display:block;
  filter:drop-shadow(0 0 30px rgba(232,66,42,0.5))}
.onboard-title{
  font-family:'Barlow Condensed',sans-serif;font-size:42px;font-weight:900;
  text-transform:uppercase;letter-spacing:0.04em;line-height:1;
}
.onboard-title em{color:var(--accent);font-style:normal}
.onboard-sub{font-size:13px;color:var(--muted);margin-top:8px}

/* ── TAB PILLS ── */
.tab-pills{display:flex;background:rgba(255,255,255,0.05);border-radius:12px;padding:3px;margin-bottom:20px}
.tab-pill{flex:1;padding:8px;border-radius:9px;border:none;background:transparent;
  color:var(--muted);font-family:'Barlow',sans-serif;font-size:13px;font-weight:600;
  cursor:pointer;transition:all .2s}
.tab-pill.active{background:var(--card2);color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,0.3)}

/* ── PLAYER SELECT GRID ── */
.player-grid{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
.player-select-btn{
  display:flex;align-items:center;gap:10px;
  padding:10px 14px;border-radius:12px;
  border:1.5px solid var(--border2);background:rgba(255,255,255,0.03);
  color:var(--text);cursor:pointer;transition:all .18s;text-align:left;
  font-family:'Barlow',sans-serif;font-size:14px;font-weight:600;
}
.player-select-btn:hover{border-color:rgba(255,255,255,0.2);background:rgba(255,255,255,0.07)}
.player-select-btn.selected{border-color:var(--accent);background:rgba(232,66,42,0.1);color:#fff}

/* ── PIN INPUT ── */
.pin-input{
  letter-spacing:8px;font-size:24px;text-align:center;
  font-family:'DM Mono',monospace;
}

/* ── ADMIN ── */
.admin-tabs{display:flex;gap:6px;padding:12px 12px 0}
.admin-result-box{background:rgba(255,255,255,0.04);border-radius:12px;padding:12px;margin-bottom:8px}

/* ── GAME ROW ── */
.game-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px}
.game-row:last-child{border-bottom:none}

/* ── TOAST ── */
#toast{
  position:fixed;bottom:84px;left:50%;transform:translateX(-50%) translateY(16px);
  background:rgba(20,20,32,0.96);border:1px solid var(--border2);
  border-radius:999px;padding:10px 20px;font-size:13px;font-weight:500;color:var(--text);
  opacity:0;transition:all .28s cubic-bezier(.34,1.56,.64,1);z-index:999;
  white-space:nowrap;pointer-events:none;backdrop-filter:blur(12px);
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── LOADING ── */
.load-screen{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;gap:14px;
}
.spinner{
  width:40px;height:40px;border-radius:50%;
  border:3px solid var(--border2);border-top-color:var(--accent);
  animation:spin .65s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.load-label{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted)}

/* ── EMPTY ── */
.empty{text-align:center;padding:3rem 1rem;color:var(--muted);font-size:14px}
.empty-icon{font-size:36px;margin-bottom:10px;display:block}

/* ── MISC ── */
.divider{height:1px;background:var(--border);margin:12px 0}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* ── MVP PICKER MODAL ── */
.mvp-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.75);
  z-index:200;display:flex;align-items:flex-end;justify-content:center;
  backdrop-filter:blur(6px);animation:fadeIn .2s ease;
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.mvp-sheet{
  width:100%;max-width:480px;
  background:var(--card2);border-radius:24px 24px 0 0;
  border-top:1px solid var(--border2);
  padding:20px 16px 32px;max-height:88vh;overflow-y:auto;
}
.mvp-sheet-handle{
  width:40px;height:4px;border-radius:2px;
  background:var(--border2);margin:0 auto 20px;
}
.mvp-sheet-title{
  font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900;
  text-transform:uppercase;letter-spacing:0.05em;margin-bottom:4px;
}
.mvp-sheet-sub{font-size:12px;color:var(--muted);margin-bottom:18px}
.mvp-grid{
  display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px;
}
.mvp-card{
  display:flex;flex-direction:column;align-items:center;gap:6px;
  padding:12px 6px 10px;border-radius:14px;
  border:1.5px solid var(--border);background:rgba(255,255,255,0.03);
  cursor:pointer;transition:all .18s;text-align:center;
}
.mvp-card:hover{border-color:var(--border2);background:rgba(255,255,255,0.07)}
.mvp-card.selected{
  border-color:var(--gold);background:rgba(245,197,24,0.12);
  box-shadow:0 0 20px rgba(245,197,24,0.2);
}
.mvp-card-photo{
  width:60px;height:60px;border-radius:50%;overflow:hidden;

<body>
<div id="root"></div>
<script>
// ══════════════════════════════════════════════════
// CONFIG — remplace par tes clés Supabase
// ══════════════════════════════════════════════════
const SUPABASE_URL = 'https://xuqjqnjsjwzryqdnuqgl.supabase.co';
const SUPABASE_KEY = 'sb_publishable_38VfDqnFBj7E8EpAtW38nA_m7zAntx8';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ══════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════
let state = {
  loading:true, currentPage:'leaderboard',
  currentPlayer:null, showOnboarding:false,
  onboardLogin:false, selectedLoginPlayer:null,
  adminAuthed:false, adminPage:'series',
  series:[], games:{}, predictions:[],
  players:[], settings:{}, leaderboard: [],
  mvpPredictions: []
};

// Temp state for in-progress predictions (survives re-renders)
const predTemp = {};
const editMode = {};
let skipNextSeriesRealtime = 0;
let skipNextGamesRealtime = 0;
let skipNextPredictionRealtime = 0;
let skipNextPlayersRealtime = 0;
let skipNextSettingsRealtime = 0;

// ══════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════
async function init() {
  const saved = localStorage.getItem('nba26_player');
  if (saved) try { state.currentPlayer = JSON.parse(saved); } catch(e){}
  await loadAll();
  subscribeRealtime();
  state.loading = false;
  if (!state.currentPlayer) {
    state.showOnboarding = true;
    state.onboardLogin = state.players.length > 0;
  } else {
    // Re-validate player still exists
    const still = state.players.find(p => p.id === state.currentPlayer.id);
    if (!still) { state.currentPlayer=null; state.showOnboarding=true; state.onboardLogin=state.players.length>0; }
    else state.currentPlayer = still; // refresh data
  }
  render();
}

async function loadAll() {
  await Promise.all([
    loadSettings(),
    loadSeries(),
    loadPlayers(),
    loadPredictions(),
    loadMvpPredictions()
  ]);
  computeLeaderboard();
}

async function loadSettings() {
  const {data} = await sb.from('settings').select('*');
  if (data) data.forEach(r => { try { state.settings[r.key]=JSON.parse(r.value); } catch { state.settings[r.key]=r.value; }});
}
async function loadSeries() {
  const {data} = await sb.from('series').select('*').order('created_at',{ascending:true});
  state.series = data||[];
  const {data:games} = await sb.from('games').select('*').order('game_number');
  state.games = {};
  (games||[]).forEach(g=>{ if(!state.games[g.series_id]) state.games[g.series_id]=[]; state.games[g.series_id].push(g); });
}
async function loadPlayers() {
  const {data} = await sb.from('players').select('*').order('created_at');
  state.players = data||[];
}
async function loadPredictions() {
  const {data} = await sb.from('predictions').select('*');
  state.predictions = data||[];
}

async function loadMvpPredictions() {
  const { data } = await sb
    .from('mvp_predictions')
    .select('*')
    .order('updated_at', { ascending: false });

  state.mvpPredictions = data || [];
}

// ── BUG FIX: compute leaderboard client-side so it's always fresh ──
function computeLeaderboard() {
  const ptsSW = Number(state.settings['points_series_winner'] ?? 3);
  const ptsSE = Number(state.settings['points_series_exact'] ?? 5);
  const ptsMW = Number(state.settings['points_match_winner'] ?? 2);

  const ptsMvpR1 = Number(state.settings['points_mvp_premier_tour'] ?? 1);
  const ptsMvpSF = Number(state.settings['points_mvp_demi_finales'] ?? 2);
  const ptsMvpCF = Number(state.settings['points_mvp_finales_conference'] ?? 4);
  const ptsMvpFN = Number(state.settings['points_mvp_finales_nba'] ?? 8);
  const actualMvp = String(state.settings['actual_mvp'] ?? '').trim().toLowerCase();

  const map = {};

  state.players.forEach(p => {
    map[p.id] = {
      id: p.id,
      name: p.name,
      avatar_color: p.avatar_color,
      total_points: 0,
      points_series_winner: 0,
      points_series_exact: 0,
      points_games: 0,
      points_mvp: 0,
      predictions_count: 0,
      correct_predictions: 0
    };
  });

  state.predictions.forEach(pred => {
    const entry = map[pred.player_id];
    if (!entry) return;

    entry.predictions_count++;

    const s = state.series.find(x => x.id === pred.series_id);
    if (!s) return;

    let sw = 0;
    let se = 0;
    let sg = 0;

    const seriesGames = state.games[s.id] || [];
    const gamePreds = Array.isArray(pred.game_predictions) ? pred.game_predictions : [];

    seriesGames.forEach(g => {
      if (g.status !== 'finished' || !g.winner) return;

      const gp = gamePreds.find(x => Number(x.game_number) === Number(g.game_number));
      if (gp && gp.predicted_winner === g.winner) {
        sg += ptsMW;
      }
    });

    if (s.status === 'finished' && s.series_winner) {
      if (pred.predicted_series_winner === s.series_winner) {
        sw = ptsSW;
        if (Number(pred.predicted_series_games) === Number(s.series_games)) {
          se = ptsSE;
        }
      }
    }

    if (sw > 0 || se > 0 || sg > 0) {
      entry.correct_predictions++;
    }

    entry.points_games += sg;
    entry.points_series_winner += sw;
    entry.points_series_exact += se;
    entry.total_points += sg + sw + se;
  });

  state.mvpPredictions.forEach(pred => {
    const entry = map[pred.player_id];
    if (!entry) return;
    if (!actualMvp) return;

    const predictedMvp = String(pred.predicted_mvp ?? '').trim().toLowerCase();
    if (!predictedMvp) return;
    if (predictedMvp !== actualMvp) return;

    let pts = 0;

    if (pred.playoff_round === 'Premier tour') pts = ptsMvpR1;
    else if (pred.playoff_round === 'Demi-finales') pts = ptsMvpSF;
    else if (pred.playoff_round === 'Finales de conférence') pts = ptsMvpCF;
    else if (pred.playoff_round === 'Finales NBA') pts = ptsMvpFN;

    entry.points_mvp += pts;
    entry.total_points += pts;

    if (pts > 0) {
      entry.correct_predictions++;
    }
  });

  state.leaderboard = Object.values(map).sort((a, b) => b.total_points - a.total_points);
}

// ══════════════════════════════════════════════════
// REALTIME
// ══════════════════════════════════════════════════
function subscribeRealtime() {
  sb.channel('db-all')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'series' }, async () => {
      if (skipNextSeriesRealtime > 0) {
        skipNextSeriesRealtime--;
        return;
      }
      await loadSeries();
      await loadPredictions();
      computeLeaderboard();
      render();
    })
    .on('postgres_changes', { event: '*', schema: 'public', table: 'games' }, async () => {
      if (skipNextGamesRealtime > 0) {
        skipNextGamesRealtime--;
        return;
      }
      await loadSeries();
      await loadPredictions();
      computeLeaderboard();
      render();
    })
    .on('postgres_changes', { event: '*', schema: 'public', table: 'predictions' }, async () => {
      if (skipNextPredictionRealtime > 0) {
        skipNextPredictionRealtime--;
        return;
      }
      await loadPredictions();
      computeLeaderboard();
      render();
    })
    .on('postgres_changes', { event: '*', schema: 'public', table: 'players' }, async () => {
      if (skipNextPlayersRealtime > 0) {
        skipNextPlayersRealtime--;
        return;
      }
      await loadPlayers();
      await loadPredictions();
      computeLeaderboard();
      render();
    })
    .on('postgres_changes', { event: '*', schema: 'public', table: 'settings' }, async () => {
      if (skipNextSettingsRealtime > 0) {
        skipNextSettingsRealtime--;
        return;
      }
      await loadSettings();
      computeLeaderboard();
      render();
    })
    .on('postgres_changes', { event: '*', schema: 'public', table: 'mvp_predictions' }, async () => {
    await loadMvpPredictions();
    computeLeaderboard();
    render();
})
    .subscribe();
}

// ══════════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════════
async function hashPin(pin) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pin));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
function toast(msg, ms=2800) {
  const el=document.getElementById('toast');
  if(!el)return; el.textContent=msg; el.classList.add('show');
  clearTimeout(el._t); el._t=setTimeout(()=>el.classList.remove('show'),ms);
}
function avatarColor(name) {
  const c=['#e8422a','#3d7fff','#1db954','#a855f7','#f59e0b','#ef4444','#06b6d4','#ec4899'];
  let h=0; for(let ch of name) h=(h*31+ch.charCodeAt(0))%c.length; return c[h];
}
function initials(name) { return name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2); }
function fmtDate(iso) {
  if(!iso) return '—';
  return new Date(iso).toLocaleDateString('fr-FR',{weekday:'short',day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
}
function isLocked(s) {
  if(s.status==='locked'||s.status==='finished') return true;
  if(s.start_time) return new Date()>=new Date(s.start_time);
  return false;
}
function isGameLocked(g) {
  if(g.status==='locked'||g.status==='finished') return true;
  if(g.start_time) return new Date()>=new Date(g.start_time);
  return false;
}

function isEditingSeries(seriesId) {
  return !!editMode[seriesId];
}

function startEditingSeries(seriesId) {
  editMode[seriesId] = true;
  render();
}

function stopEditingSeries(seriesId) {
  delete editMode[seriesId];
}

function getPred(playerId, seriesId) { return state.predictions.find(p=>p.player_id===playerId&&p.series_id===seriesId); }
function myPred(seriesId) { return state.currentPlayer ? getPred(state.currentPlayer.id, seriesId) : null; }
function allPreds(seriesId) { return state.predictions.filter(p=>p.series_id===seriesId); }
function getPlayer(id) { return state.players.find(p=>p.id===id); }
function isLockedSeriesForMyPick(s) {
  if (s.status === 'locked' || s.status === 'finished') return true;
  if (s.start_time) return new Date() >= new Date(s.start_time);
  return false;
}

function getMvpPredForRound(playerId, playoffRound) {
  return state.mvpPredictions.find(
    p => p.player_id === playerId && p.playoff_round === playoffRound
  );
}

function myMvpPred(playoffRound) {
  if (!state.currentPlayer) return null;
  return getMvpPredForRound(state.currentPlayer.id, playoffRound);
}

async function saveMvpPrediction(playoffRound, predictedMvp) {

  if (!state.currentPlayer) return false;
  if (isMvpLocked(playoffRound)) {
    toast('🔒 Trop tard ! Le round a commencé.');
    return false;
  }
  const existing = myMvpPred(playoffRound);

  const payload = {
    player_id: state.currentPlayer.id,
    playoff_round: playoffRound,
    predicted_mvp: predictedMvp,
    updated_at: new Date().toISOString()
  };

  let error;

  if (existing) {
    ({ error } = await sb
      .from('mvp_predictions')
      .update(payload)
      .eq('id', existing.id));
  } else {
    ({ error } = await sb
      .from('mvp_predictions')
      .insert(payload));
  }

  if (error) {
    console.error(error);
    toast('❌ Erreur sauvegarde MVP');
    return false;
  }

  await loadMvpPredictions();
  computeLeaderboard();
  toast('✅ Pronostic MVP enregistré');
  render();
  return true;
}

async function promptMvpPrediction(round) {
  const current = myMvpPred(round);
  const value = prompt(
    `Pronostic MVP - ${round}`,
    current?.predicted_mvp || ''
  );

  if (!value || !value.trim()) return;
  await saveMvpPrediction(round, value.trim());
}

function isMvpLocked(round) {
  // on récupère les séries de ce round
  const seriesOfRound = state.series.filter(s => s.round === round);

  // si aucune série → pas bloqué
  if (!seriesOfRound.length) return false;

  // on prend la plus tôt (important)
  const earliestStart = seriesOfRound
    .map(s => s.start_time)
    .filter(Boolean)
    .sort()[0];

  if (!earliestStart) return false;

  return new Date() >= new Date(earliestStart);
}

// ══════════════════════════════════════════════════
// ACTIONS
// ══════════════════════════════════════════════════
async function createPlayer(name, pin) {
  const color = avatarColor(name);
  const pin_hash = await hashPin(pin);

  skipNextPlayersRealtime += 1;

  const { data, error } = await sb
    .from('players')
    .insert({ name, avatar_color: color, pin_hash })
    .select()
    .single();

  if (error) {
    console.error(error);
    skipNextPlayersRealtime = Math.max(0, skipNextPlayersRealtime - 1);
    toast('❌ ' + (error.message || 'Nom déjà pris ?'));
    return null;
  }

  return data;
}
async function verifyPin(player, pin) { return (await hashPin(pin))===player.pin_hash; }

async function savePrediction(seriesId, seriesWinner, seriesGames, gamePredsList) {
  if (!state.currentPlayer) return false;

  const existing = myPred(seriesId);
  const payload = {
    player_id: state.currentPlayer.id,
    series_id: seriesId,
    predicted_series_winner: seriesWinner,
    predicted_series_games: Number(seriesGames),
    game_predictions: gamePredsList,
    updated_at: new Date().toISOString(),
    points_series_winner: 0,
    points_series_exact: 0,
    points_games: 0,
    total_points: 0,
  };

  skipNextPredictionRealtime += 1;

  let err;
  if (existing) {
    ({ error: err } = await sb.from('predictions').update(payload).eq('id', existing.id));
  } else {
    ({ error: err } = await sb.from('predictions').insert(payload));
  }

  if (err) {
    skipNextPredictionRealtime = Math.max(0, skipNextPredictionRealtime - 1);
    toast('❌ Erreur sauvegarde');
    return false;
  }

  await loadPredictions();
  computeLeaderboard();
  toast('✅ Pronostic enregistré !');
  return true;
}

async function setSeriesResult(id, winner, games) {
  try {
    const { error: e1 } = await sb
      .from('series')
      .update({
        series_winner: winner,
        series_games: Number(games),
        status: 'finished'
      })
      .eq('id', id);

    if (e1) {
      console.error(e1);
      toast('❌ Erreur mise à jour série');
      return;
    }

    try { await sb.rpc('recalculate_points', { p_series_id: id }); } catch(e) { console.warn('RPC serie:', e); }

    await loadSeries();
    await loadPredictions();
    computeLeaderboard();
    render();
    toast('🏆 Résultat enregistré !');
  } catch (err) {
    console.error('setSeriesResult crash:', err);
    toast('❌ Erreur JS lors de la validation');
  }
}

async function setGameResult(gameId, seriesId, winner) {
  try {
    const { error } = await sb
      .from('games')
      .update({
        winner,
        status: 'finished'
      })
      .eq('id', gameId);

    if (error) {
      console.error(error);
      toast('❌ Erreur mise à jour match');
      return;
    }

    try { await sb.rpc('recalculate_points', { p_series_id: seriesId }); } catch(e) { console.warn('RPC match:', e); }

    await loadSeries();
    await loadPredictions();
    computeLeaderboard();
    render();
    toast('✅ Résultat du match enregistré');
  } catch (err) {
    console.error('setGameResult crash:', err);
    toast('❌ Erreur JS lors de la validation');
  }
}

async function lockSeries(id) {
  await sb.from('series').update({status:'locked'}).eq('id',id);
  await loadSeries(); render(); toast('🔒 Série verrouillée');
}
async function deleteSeries(id) {
  if (!confirm('Supprimer cette série et tous ses pronostics ?')) return;

  // On ignore les events realtime déclenchés par CETTE suppression locale
  skipNextPredictionRealtime += 1;
  skipNextGamesRealtime += 1;
  skipNextSeriesRealtime += 1;

  const { error: e1 } = await sb.from('predictions').delete().eq('series_id', id);
  if (e1) {
    console.error(e1);
    skipNextPredictionRealtime = Math.max(0, skipNextPredictionRealtime - 1);
    skipNextGamesRealtime = Math.max(0, skipNextGamesRealtime - 1);
    skipNextSeriesRealtime = Math.max(0, skipNextSeriesRealtime - 1);
    return toast(`❌ Erreur suppression pronostics : ${e1.message}`);
  }

  const { error: e2 } = await sb.from('games').delete().eq('series_id', id);
  if (e2) {
    console.error(e2);
    skipNextGamesRealtime = Math.max(0, skipNextGamesRealtime - 1);
    skipNextSeriesRealtime = Math.max(0, skipNextSeriesRealtime - 1);
    return toast(`❌ Erreur suppression matchs : ${e2.message}`);
  }

  const { error: e3 } = await sb.from('series').delete().eq('id', id);
  if (e3) {
    console.error(e3);
    skipNextSeriesRealtime = Math.max(0, skipNextSeriesRealtime - 1);
    return toast(`❌ Erreur suppression série : ${e3.message}`);
  }

  await loadSeries();
  await loadPredictions();
  computeLeaderboard();
  render();
  toast('🗑 Série supprimée');
}
async function addSeries(t1, t2, round, conf, startTime) {
  skipNextSeriesRealtime += 1;

  const { error } = await sb.from('series').insert({
    team1: t1,
    team2: t2,
    round,
    conference: conf,
    start_time: startTime || null,
    status: 'upcoming'
  });

  if (error) {
    skipNextSeriesRealtime = Math.max(0, skipNextSeriesRealtime - 1);
    return toast(`❌ Erreur ajout série : ${error.message}`);
  }

  await loadSeries();
  render();
  toast('✅ Série ajoutée');
}
async function addGame(seriesId, gameNumber, startTime) {
  skipNextGamesRealtime += 1;

  const { error } = await sb.from('games').insert({
    series_id: seriesId,
    game_number: gameNumber,
    start_time: startTime || null,
    status: 'upcoming'
  });

  if (error) {
    skipNextGamesRealtime = Math.max(0, skipNextGamesRealtime - 1);
    return toast(`❌ Erreur ajout match : ${error.message}`);
  }

  await loadSeries();
  render();
  toast('✅ Match ajouté');
}
async function saveSettings(updates) {
  const entries = Object.entries(updates);
  skipNextSettingsRealtime += entries.length;

  for (const [k, v] of entries) {
    const { error } = await sb
      .from('settings')
      .update({ value: JSON.stringify(v) })
      .eq('key', k);

    if (error) {
      console.error(error);
      skipNextSettingsRealtime = Math.max(0, skipNextSettingsRealtime - 1);
      return toast(`❌ Erreur sauvegarde paramètre : ${error.message}`);
    }
  }

  await loadSettings();
  computeLeaderboard();
  toast('✅ Sauvegardé');
  render();
}
async function adminDeletePlayer(pid, name) {
  if (!confirm(`Supprimer "${name}" et tous ses pronostics ?`)) return;

  skipNextPredictionRealtime += 1;
  skipNextPlayersRealtime += 1;

  const { error: e1 } = await sb.from('predictions').delete().eq('player_id', pid);
  if (e1) {
    console.error(e1);
    skipNextPredictionRealtime = Math.max(0, skipNextPredictionRealtime - 1);
    skipNextPlayersRealtime = Math.max(0, skipNextPlayersRealtime - 1);
    return toast(`❌ Erreur suppression pronostics : ${e1.message}`);
  }

  const { error: e2 } = await sb.from('players').delete().eq('id', pid);
  if (e2) {
    console.error(e2);
    skipNextPlayersRealtime = Math.max(0, skipNextPlayersRealtime - 1);
    return toast(`❌ Erreur suppression joueur : ${e2.message}`);
  }

  await loadPlayers();
  await loadPredictions();
  computeLeaderboard();
  render();
  toast(`🗑 ${name} supprimé`);
}
async function adminResetPin(pid, name) {
  if (!confirm(`Remettre le PIN de ${name} à zéro ? Il devra en créer un nouveau à sa prochaine connexion.`)) return;

  skipNextPlayersRealtime += 1;

  const { error } = await sb
    .from('players')
    .update({ pin_hash: '' })
    .eq('id', pid);

  if (error) {
    console.error(error);
    skipNextPlayersRealtime = Math.max(0, skipNextPlayersRealtime - 1);
    return toast(`❌ Erreur reset PIN : ${error.message}`);
  }

  await loadPlayers();
  render();
  toast(`✅ PIN de ${name} remis à zéro`);
}

// ══════════════════════════════════════════════════
// RENDER ENGINE
// ══════════════════════════════════════════════════
function render() {
  const root = document.getElementById('root');

  if (state.loading) {
    root.innerHTML = `<div class="load-screen"><div class="spinner"></div><div class="load-label">Chargement</div></div>`;
    return;
  }

  if (state.showOnboarding) {
    root.innerHTML = renderOnboarding();
    return;
  }

  const cp = state.currentPlayer;

  let pageContent = '';
  if (state.currentPage === 'leaderboard') pageContent = renderLeaderboard();
  else if (state.currentPage === 'predictions') pageContent = renderPredictions();
  else if (state.currentPage === 'mypicks') pageContent = renderMyPicks();
  else if (state.currentPage === 'series') pageContent = renderSeriesPage();
  else if (state.currentPage === 'admin') pageContent = renderAdmin();

  root.innerHTML = `
    <div id="app">
      <div class="app-header">
        <div class="header-top">
          <div class="logo-mark">🏀</div>
          <div>
            <div class="header-wordmark">NBA <span>Playoffs</span></div>
            <div class="header-season">Saison 2026 · Pronostics</div>
          </div>
          <button class="header-player-btn" onclick="switchPlayer()">
            <span class="player-dot" style="background:${cp?.avatar_color || '#555'}">${initials(cp?.name || '?')}</span>
            ${cp?.name || '—'}
          </button>
        </div>

        <div class="nav-bar">
          <button class="nav-item ${state.currentPage==='leaderboard'?'active':''}" onclick="navTo('leaderboard')">
            <span class="nav-icon">🏆</span>Classement
          </button>
          <button class="nav-item ${state.currentPage==='mypicks'?'active':''}" onclick="navTo('mypicks')">

async function onboardCreate() {
  const name=document.getElementById('ob-name')?.value.trim();
  const pin=document.getElementById('ob-pin')?.value;
  const pin2=document.getElementById('ob-pin2')?.value;
  if(!name) return toast('Entre un prénom !');
  if(!/^\d{4}$/.test(pin)) return toast('Le PIN doit être 4 chiffres exactement.');
  if(pin!==pin2) return toast('Les PINs ne correspondent pas !');
  if(state.players.find(p=>p.name.toLowerCase()===name.toLowerCase())) return toast('❌ Ce prénom est déjà pris !');

  const player = await createPlayer(name, pin);
  if (player) {
    await loadPlayers();
    setCurrentPlayer(player);
  }
}
async function doLogin() {
  const pid = state.selectedLoginPlayer;
  const pin = document.getElementById('ob-login-pin')?.value;

  if (!pid) return toast('Sélectionne ton profil !');

  const player = state.players.find(p => p.id === pid);
  if (!player) return toast('Profil introuvable.');

  // PIN remis à zéro : le joueur doit en créer un nouveau
  if (!player.pin_hash) {
    const np = prompt(`Ton PIN a été réinitialisé. Choisis un nouveau PIN à 4 chiffres :`);
    if (!np) return;
    if (!/^\d{4}$/.test(np)) return toast('Le PIN doit contenir exactement 4 chiffres.');

    const c = prompt('Confirme ton nouveau PIN :');
    if (np !== c) return toast('Les deux PINs ne correspondent pas.');

    const { error } = await sb
      .from('players')
      .update({ pin_hash: await hashPin(np) })
      .eq('id', pid);

    if (error) {
      console.error(error);
      return toast(`❌ Erreur création PIN : ${error.message}`);
    }

    await loadPlayers();
    const updated = state.players.find(p => p.id === pid) || player;
    setCurrentPlayer(updated);
    toast('✅ Nouveau PIN enregistré');
    return;
  }

  if (!pin) return toast('Entre ton PIN !');

  if (!(await verifyPin(player, pin))) return toast('❌ PIN incorrect !');

  setCurrentPlayer(player);
}
function setCurrentPlayer(p) {
  state.currentPlayer=p; localStorage.setItem('nba26_player',JSON.stringify(p));
  state.showOnboarding=false; render();
}

function renderMyPickCard(s, p) {
  const games = state.games[s.id] || [];
  const isFinished = s.status === 'finished';
  const isLocked = s.status === 'locked' || isLockedSeriesForMyPick(s);

  const ptsSW = Number(state.settings['points_series_winner'] ?? 3);
  const ptsSE = Number(state.settings['points_series_exact'] ?? 5);
  const ptsMW = Number(state.settings['points_match_winner'] ?? 2);
  const ptsMvpR1 = Number(state.settings['points_mvp_premier_tour'] ?? 1);
  const ptsMvpSF = Number(state.settings['points_mvp_demi_finales'] ?? 2);
  const ptsMvpCF = Number(state.settings['points_mvp_finales_conference'] ?? 4);
  const ptsMvpFN = Number(state.settings['points_mvp_finales_nba'] ?? 8);
  const actualMvp = String(state.settings['actual_mvp'] ?? '').trim();

  let pointsGames = 0;
  let pointsSeriesWinner = 0;
  let pointsSeriesExact = 0;

  const gamePreds = p.game_predictions || [];

  games.forEach(g => {
    if (g.status !== 'finished' || !g.winner) return;
    const gp = gamePreds.find(x => Number(x.game_number) === Number(g.game_number));
    if (gp && gp.predicted_winner === g.winner) {
      pointsGames += ptsMW;
    }
  });

  if (isFinished && s.series_winner) {
    if (p.predicted_series_winner === s.series_winner) {
      pointsSeriesWinner = ptsSW;
      if (Number(p.predicted_series_games) === Number(s.series_games)) {
        pointsSeriesExact = ptsSE;
      }
    }
  }

  const totalPoints = pointsGames + pointsSeriesWinner + pointsSeriesExact;

  let statusBadge = '';

// BUG FIX: pickers update predTemp AND DOM without full re-render
function pickTeam(pid, team) {
  if (!predTemp[pid]) predTemp[pid] = {};
  predTemp[pid].winner = team;

  document.querySelectorAll(`#sw-${pid} .team-btn`).forEach(b => {
    b.classList.toggle('selected', b.textContent.trim() === team);
  });

  const card = document.querySelector(`#sw-${pid}`)?.closest('.card');
  const previewText = card?.querySelector('.my-pred-text');
  if (previewText) {
    const currentGames = predTemp[pid].games;
    const previousText = previewText.textContent || '';
    const match = previousText.match(/en (\d+)/);
    const gamesText = currentGames || (match ? match[1] : '?');
    previewText.textContent = `${team} en ${gamesText}`;
  }
}

function pickGames(pid, n) {
  if (!predTemp[pid]) predTemp[pid] = {};
  predTemp[pid].games = n;

  document.querySelectorAll(`#sg-${pid} .games-btn`).forEach(b => {
    b.classList.toggle('selected', b.textContent.trim() === `en ${n}`);
  });

  const card = document.querySelector(`#sg-${pid}`)?.closest('.card');
  const previewText = card?.querySelector('.my-pred-text');
  if (previewText) {
    const previousText = previewText.textContent || '';
    const teamText = previousText.split(' en ')[0] || '?';
    previewText.textContent = `${teamText} en ${n}`;
  }
}

function pickGameWinner(seriesId, gid, gameNumber, team) {
  const key = `gp_${seriesId}`;
  if (!predTemp[key]) predTemp[key] = {};
  if (!predTemp[key].gamePreds) predTemp[key].gamePreds = {};

  predTemp[key].gamePreds[gameNumber] = team;

  document.querySelectorAll(`#${gid} .team-btn`).forEach(b => {
    b.classList.toggle('selected', b.textContent.trim() === team);
  });
}
async function submitPred(seriesId, pid, team1, team2) {
  const mp=myPred(seriesId);
  const tmp=predTemp[pid]||{};
  // BUG FIX: merge temp with saved, temp takes priority
  const winner = tmp.winner !== undefined ? tmp.winner : mp?.predicted_series_winner;
  const games  = tmp.games  !== undefined ? tmp.games  : (mp ? Number(mp.predicted_series_games) : null);
  if(!winner) return toast('Choisis le vainqueur !');
  if(!games)  return toast('Choisis le nombre de matchs !');

  // Merge game predictions: temp overrides saved
  const gpKey=`gp_${seriesId}`;
  const tmpGP=predTemp[gpKey]?.gamePreds||{};
  const existingGP=mp?.game_predictions||[];
  const sGames=state.games[seriesId]||[];
  const gamePredsList=sGames.map(g=>{
    const tw=tmpGP[g.game_number];
    const ew=existingGP.find(p=>Number(p.game_number)===Number(g.game_number))?.predicted_winner;
    const pw=tw||ew||null;
    return pw?{game_number:Number(g.game_number),predicted_winner:pw}:null;
  }).filter(Boolean);

  const ok = await savePrediction(seriesId, winner, games, gamePredsList);
  if (!ok) return;

  delete predTemp[pid];
  delete predTemp[`gp_${seriesId}`];
  stopEditingSeries(seriesId);

  render();
}

function cancelEditSeries(seriesId, pid) {
  delete predTemp[pid];
  delete predTemp[`gp_${seriesId}`];
  stopEditingSeries(seriesId);
  render();
}

        <input id="s-admin-code" type="text" value="${g('admin_password')}" style="width:120px;text-align:center">
      </div>
      <button class="btn btn-primary btn-block" style="margin-top:12px" onclick="doSaveSettings()">💾 Sauvegarder</button>
    </div>
    <div class="section-label">Gérer les joueurs</div>
    <div class="card">
      ${!state.players.length?`<div class="empty" style="padding:12px">Aucun joueur inscrit.</div>`:
        state.players.map(p=>`
          <div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)">
            <div style="width:34px;height:34px;border-radius:50%;background:${p.avatar_color};display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0">${initials(p.name)}</div>
            <span style="flex:1;font-size:14px;font-weight:600">${p.name}</span>
            <button class="btn btn-sm" onclick="adminResetPin('${p.id}','${p.name}')">🔁 Remettre à zéro</button>
            <button class="btn btn-sm btn-danger" onclick="adminDeletePlayer('${p.id}','${p.name}')">🗑</button>
          </div>`).join('')}
    </div>`;
}

async function doSaveSettings() {
  const updates = {};

  // ── Points classiques ──
  const pg = document.getElementById('s-pts-game');
  const ps = document.getElementById('s-pts-series');
  const pe = document.getElementById('s-pts-exact');
  const ac = document.getElementById('s-admin-code');

  if (pg) updates['points_match_winner'] = parseInt(pg.value);
  if (ps) updates['points_series_winner'] = parseInt(ps.value);
  if (pe) updates['points_series_exact'] = parseInt(pe.value);
  if (ac) updates['admin_password'] = ac.value;

  // ── MVP ──
  const am  = document.getElementById('s-actual-mvp');
  const mr1 = document.getElementById('s-mvp-r1');
  const msf = document.getElementById('s-mvp-sf');
  const mcf = document.getElementById('s-mvp-cf');
  const mfn = document.getElementById('s-mvp-fn');

  if (am)  updates['actual_mvp'] = am.value;
  if (mr1) updates['points_mvp_premier_tour'] = parseInt(mr1.value);
  if (msf) updates['points_mvp_demi_finales'] = parseInt(msf.value);
  if (mcf) updates['points_mvp_finales_conference'] = parseInt(mcf.value);
  if (mfn) updates['points_mvp_finales_nba'] = parseInt(mfn.value);

  await saveSettings(updates);
}

function teamLogo(name) {
  const key = (name||'').toLowerCase().trim();
  const code = NBA_LOGOS[key];
  if (!code) return null;
  return `https://a.espncdn.com/i/teamlogos/nba/500/${code}.png`;
}

function vsTeamHTML(name, alignRight=false) {
  const logo = teamLogo(name);
  return `<div class="vs-team${alignRight?' right':''}">
    ${logo
      ? `<img class="vs-team-logo" src="${logo}" alt="${name}" onerror="this.style.display='none'">`
      : ''}
    <div class="vs-team-name">${name}</div>
  </div>`;
}

function playerPhoto(espnId) {
  return `https://a.espncdn.com/i/headshots/nba/players/full/${espnId}.png`;
}

// State for the MVP picker modal
let mvpPickerState = { open:false, round:null };

function openMvpPicker(round) {
  mvpPickerState = { open:true, round };
  const existing = document.getElementById('mvp-overlay');
  if (existing) existing.remove();

  const pred = myMvpPred(round);
  const existingName = pred?.predicted_mvp || '';
  const isCandidate = MVP_CANDIDATES.some(c => c.name === existingName);

  const candidatesHTML = MVP_CANDIDATES.map(c => `
    <div class="mvp-card ${existingName===c.name?'selected':''}" id="mvpc-${c.espnId}" onclick="pickMvpDirect(event,'${round}','${c.name}','${c.espnId}')">
      <div class="mvp-card-photo">
        <img src="${playerPhoto(c.espnId)}" alt="${c.short}"
          onerror="this.parentElement.innerHTML='<div style=\'width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:20px;\'>🏀</div>'">
      </div>
      <div class="mvp-card-name">${c.short}</div>
      <div class="mvp-card-team">${c.team}</div>
    </div>
  `).join('');

  const html = `
    <div class="mvp-overlay" id="mvp-overlay" onclick="handleMvpOverlayClick(event)">
      <div class="mvp-sheet" onclick="event.stopPropagation()">
        <div class="mvp-sheet-handle"></div>
        <div class="mvp-sheet-title">Pronostic MVP</div>
        <div class="mvp-sheet-sub">${round} — Clique pour sélectionner directement</div>
        <div class="mvp-grid" id="mvp-grid">${candidatesHTML}</div>
        <div class="mvp-other-box ${!isCandidate&&existingName?'active':''}" id="mvp-other-box">
          <div style="font-size:12px;font-weight:600;color:var(--muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:0.06em">Autre joueur</div>
          <input id="mvp-other-input" type="text" placeholder="Nom du joueur..."
            value="${!isCandidate?existingName:''}"
            oninput="onMvpOtherInput(this.value)"
            style="margin-bottom:8px">
          <button class="btn btn-gold btn-sm btn-block" onclick="confirmMvpOther('${round}')">
            👑 Confirmer ce joueur
          </button>
        </div>
        <button class="btn btn-ghost btn-sm btn-block" onclick="closeMvpPicker()" style="margin-top:6px">Annuler</button>
      </div>
    </div>`;

  document.body.insertAdjacentHTML('beforeend', html);
}

function closeMvpPicker() {
  mvpPickerState.open = false;
  const el = document.getElementById('mvp-overlay');
  if (el) el.remove();
}

// FIX 1 & 3: clic joueur = sélection + sauvegarde immédiate, sans recréer le DOM
async function pickMvpDirect(e, round, name, espnId) {
  e.stopPropagation();
  // Highlight sélectionné en DOM pur, sans re-render
  document.querySelectorAll('#mvp-grid .mvp-card').forEach(el => el.classList.remove('selected'));
  document.getElementById('mvpc-' + espnId)?.classList.add('selected');
  // Désactiver "Autre"
  document.getElementById('mvp-other-box')?.classList.remove('active');
  document.getElementById('mvp-other-input') && (document.getElementById('mvp-other-input').value = '');
  // Sauvegarder directement
  closeMvpPicker();
  await saveMvpPrediction(round, name);
}

// FIX 2: oninput ne recrée jamais le DOM
function onMvpOtherInput(val) {
  const box = document.getElementById('mvp-other-box');
  if (box) box.classList.toggle('active', val.length > 0);
  // Désélectionner les cartes joueurs
  if (val.length > 0) {
    document.querySelectorAll('#mvp-grid .mvp-card').forEach(el => el.classList.remove('selected'));
  }
}

async function confirmMvpOther(round) {
  const val = document.getElementById('mvp-other-input')?.value.trim();
  if (!val) return toast('Entre un nom de joueur !');
  closeMvpPicker();
  await saveMvpPrediction(round, val);
}

function handleMvpOverlayClick(e) {
  if (e.target.id === 'mvp-overlay') closeMvpPicker();
}
