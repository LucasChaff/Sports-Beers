<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>NBA Playoffs 2026</title>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#05050a;
  --surface:#0c0c14;
  --card:#11111c;
  --card2:#16162a;
  --border:rgba(255,255,255,0.06);
  --border2:rgba(255,255,255,0.12);
  --text:#f0f2ff;
  --muted:rgba(200,205,240,0.5);
  --dim:rgba(200,205,240,0.25);
  --accent:#e8422a;
  --accent2:#ff7a5c;
  --gold:#f5c518;
  --gold2:#ffd966;
  --blue:#3d7fff;
  --green:#1db954;
  --red:#e8422a;
  --amber:#f59e0b;
  --r:12px;
  --r2:20px;
}
body{
  font-family:'Barlow',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}
/* ── COURT TEXTURE BG ── */
body::before{
  content:'';
  position:fixed;inset:0;
  background:
    radial-gradient(ellipse 70% 40% at 50% -10%,rgba(232,66,42,0.18) 0%,transparent 60%),
    radial-gradient(ellipse 40% 30% at 100% 60%,rgba(61,127,255,0.10) 0%,transparent 60%),
    repeating-linear-gradient(90deg,rgba(255,255,255,0.012) 0px,rgba(255,255,255,0.012) 1px,transparent 1px,transparent 60px),
    repeating-linear-gradient(0deg,rgba(255,255,255,0.012) 0px,rgba(255,255,255,0.012) 1px,transparent 1px,transparent 60px);
  pointer-events:none;z-index:0;
}
#root{position:relative;z-index:1}

/* ── LAYOUT ── */
#app{max-width:480px;margin:0 auto;padding:0 0 5rem}
.page{display:none}
.page.active{display:block;animation:fadeUp .25s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* ── HEADER ── */
.app-header{
  position:sticky;top:0;z-index:80;
  background:rgba(5,5,10,0.85);
  backdrop-filter:blur(24px) saturate(1.4);
  -webkit-backdrop-filter:blur(24px) saturate(1.4);
  border-bottom:1px solid var(--border2);
}
.header-top{
  display:flex;align-items:center;gap:10px;
  padding:14px 16px 10px;
}
.logo-mark{
  width:36px;height:36px;border-radius:10px;flex-shrink:0;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:flex;align-items:center;justify-content:center;
  font-size:18px;
  box-shadow:0 0 20px rgba(232,66,42,0.4);
}
.header-wordmark{
  font-family:'Barlow Condensed',sans-serif;
  font-weight:900;font-size:22px;letter-spacing:0.04em;line-height:1;
  text-transform:uppercase;
}
.header-wordmark span{color:var(--accent)}
.header-season{font-size:10px;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;margin-top:1px}
.header-player-btn{
  margin-left:auto;display:flex;align-items:center;gap:7px;
  background:rgba(255,255,255,0.07);border:1px solid var(--border2);
  border-radius:999px;padding:6px 10px 6px 8px;
  cursor:pointer;transition:all .2s;font-size:12px;font-weight:600;
  color:var(--text);
}
.header-player-btn:hover{background:rgba(255,255,255,0.12);border-color:rgba(255,255,255,0.2)}
.player-dot{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700}

/* ── NAV BAR ── */
.nav-bar{display:flex;border-bottom:1px solid var(--border);padding:0 4px}
.nav-item{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:9px 4px 8px;
  font-family:'Barlow Condensed',sans-serif;font-weight:700;
  font-size:12px;letter-spacing:0.06em;text-transform:uppercase;
  color:var(--muted);border:none;background:none;cursor:pointer;
  border-bottom:2px solid transparent;margin-bottom:-1px;
  transition:all .2s;
}
.nav-item.active{color:var(--accent);border-bottom-color:var(--accent)}
.nav-icon{font-size:14px;line-height:1}

/* ── SECTION LABEL ── */
.section-label{
  font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:11px;
  letter-spacing:0.16em;text-transform:uppercase;color:var(--muted);
  padding:1.5rem 16px 8px;display:flex;align-items:center;gap:8px;
}
.section-label::after{content:'';flex:1;height:1px;background:var(--border)}

/* ── CARDS ── */
.card{
  margin:0 12px 10px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--r2);
  padding:14px 16px;
  transition:border-color .2s,transform .18s;
  position:relative;overflow:hidden;
}
.card::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,0.03) 0%,transparent 60%);
  pointer-events:none;border-radius:inherit;
}
.card:hover{border-color:var(--border2)}

/* ── FORMS ── */
input,select,textarea{
  width:100%;background:rgba(255,255,255,0.05);
  border:1.5px solid var(--border2);border-radius:var(--r);
  color:var(--text);font-family:'Barlow',sans-serif;font-size:14px;
  padding:10px 12px;outline:none;transition:border-color .2s;
}
input:focus,select:focus{border-color:var(--accent);background:rgba(255,255,255,0.07)}
select option{background:#11111c}
label{font-size:11px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:5px}

/* ── BUTTONS ── */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  border:1.5px solid var(--border2);border-radius:var(--r);
  background:rgba(255,255,255,0.04);color:var(--text);
  font-family:'Barlow',sans-serif;font-size:14px;font-weight:600;
  padding:11px 18px;cursor:pointer;transition:all .2s;white-space:nowrap;
}
.btn:hover{background:rgba(255,255,255,0.09);border-color:rgba(255,255,255,0.22);transform:translateY(-1px)}
.btn:active{transform:translateY(0) scale(.98)}
.btn-primary{
  background:linear-gradient(135deg,var(--accent) 0%,#c0301a 100%);
  border-color:transparent;color:#fff;
  box-shadow:0 4px 20px rgba(232,66,42,0.35);
}
.btn-primary:hover{box-shadow:0 6px 28px rgba(232,66,42,0.5)}
.btn-gold{
  background:linear-gradient(135deg,var(--gold),#e8a800);
  border-color:transparent;color:#1a1000;font-weight:700;
}
.btn-sm{font-size:12px;padding:7px 13px;border-radius:10px}
.btn-block{width:100%}
.btn-ghost{border-color:transparent;color:var(--muted);background:transparent}
.btn-ghost:hover{color:var(--text);background:rgba(255,255,255,0.05);border-color:var(--border2)}
.btn-danger{border-color:rgba(232,66,42,0.3);color:var(--red)}
.btn-danger:hover{background:rgba(232,66,42,0.1)}

/* ── BADGES ── */
.badge{
  display:inline-flex;align-items:center;gap:4px;
  font-size:10px;font-weight:700;letter-spacing:0.05em;
  padding:3px 9px;border-radius:999px;border:1px solid;
}
.badge-red{background:rgba(232,66,42,0.15);border-color:rgba(232,66,42,0.35);color:#ff8068}
.badge-green{background:rgba(29,185,84,0.12);border-color:rgba(29,185,84,0.28);color:#1db954}
.badge-amber{background:rgba(245,158,11,0.12);border-color:rgba(245,158,11,0.28);color:var(--amber)}
.badge-blue{background:rgba(61,127,255,0.12);border-color:rgba(61,127,255,0.28);color:#6aa3ff}
.badge-gray{background:rgba(255,255,255,0.06);border-color:var(--border2);color:var(--muted)}
.badge-gold{background:rgba(245,197,24,0.15);border-color:rgba(245,197,24,0.35);color:var(--gold)}

/* ── LEADERBOARD ── */
.lb-podium{
  margin:0 12px 10px;
  background:linear-gradient(135deg,rgba(245,197,24,0.08),rgba(232,66,42,0.05));
  border:1px solid rgba(245,197,24,0.18);border-radius:var(--r2);
  padding:20px 16px 16px;position:relative;overflow:hidden;
}
.lb-podium::before{
  content:'🏆';position:absolute;right:16px;top:12px;
  font-size:64px;opacity:0.07;line-height:1;
}
.lb-podium-rank{
  font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:800;
  letter-spacing:0.2em;text-transform:uppercase;color:var(--gold);margin-bottom:14px;
}
.lb-podium-inner{display:flex;align-items:center;gap:12px}
.lb-podium-avatar{
  width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:800;flex-shrink:0;
  border:2px solid var(--gold);box-shadow:0 0 20px rgba(245,197,24,0.3);
}
.lb-podium-name{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:900;line-height:1;text-transform:uppercase}
.lb-podium-sub{font-size:12px;color:var(--muted);margin-top:3px}
.lb-podium-pts{
  margin-left:auto;text-align:right;
  font-family:'Barlow Condensed',sans-serif;font-size:52px;font-weight:900;
  color:var(--gold);line-height:1;
}
.lb-podium-pts-label{font-size:11px;color:var(--gold);opacity:0.7;letter-spacing:0.1em;text-transform:uppercase}

.lb-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.lb-row:last-child{border-bottom:none}
.lb-rank-num{
  font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;
  min-width:26px;text-align:center;color:var(--muted);
}
.lb-avatar-sm{
  width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:800;flex-shrink:0;
}
.lb-name{font-size:15px;font-weight:600;flex:1}
.lb-pts-sm{font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:800;color:var(--accent)}
.lb-pts-lbl{font-size:10px;color:var(--muted);letter-spacing:0.08em}

/* ── DETAIL TABLE ── */
.detail-table{width:100%;border-collapse:collapse;font-size:12px}
.detail-table th{
  font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;letter-spacing:0.08em;
  text-transform:uppercase;color:var(--muted);padding:4px 8px;text-align:right;
}
.detail-table th:first-child{text-align:left}
.detail-table td{padding:6px 8px;border-top:1px solid var(--border);text-align:right}
.detail-table td:first-child{text-align:left;font-weight:600;color:var(--text)}

/* ── VS CARD ── */
.vs-block{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.vs-team{flex:1;display:flex;flex-direction:column;align-items:flex-start;gap:4px}
.vs-team.right{align-items:flex-end}
.vs-team-logo{width:44px;height:44px;object-fit:contain;filter:drop-shadow(0 2px 8px rgba(0,0,0,0.4))}
.vs-team-name{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;text-transform:uppercase;line-height:1.1}
.vs-sep{
  width:36px;height:36px;border-radius:50%;flex-shrink:0;
  background:rgba(255,255,255,0.06);border:1px solid var(--border2);
  display:flex;align-items:center;justify-content:center;
  font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:800;
  color:var(--muted);letter-spacing:0.05em;
}

/* ── TEAM PICKER ── */
.team-picker{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:6px}
.team-btn{
  padding:12px 8px;border-radius:12px;
  border:1.5px solid var(--border2);background:rgba(255,255,255,0.03);
  color:var(--muted);font-family:'Barlow Condensed',sans-serif;
  font-size:16px;font-weight:700;text-transform:uppercase;letter-spacing:0.03em;
  cursor:pointer;transition:all .18s;text-align:center;
}
.team-btn.selected{background:rgba(61,127,255,0.18);border-color:var(--blue);color:#9ec4ff;box-shadow:0 0 20px rgba(61,127,255,0.2)}
.team-btn:hover:not(.selected){border-color:rgba(255,255,255,0.2);color:var(--text)}

/* ── GAMES PICKER ── */
.games-row{display:flex;gap:6px;margin-top:6px}
.games-btn{
  flex:1;padding:10px 4px;border-radius:10px;
  border:1.5px solid var(--border2);background:rgba(255,255,255,0.03);
  color:var(--muted);font-family:'Barlow Condensed',sans-serif;
  font-size:15px;font-weight:700;cursor:pointer;text-align:center;
  transition:all .18s;
}
.games-btn.selected{background:linear-gradient(135deg,var(--accent),#c0301a);border-color:transparent;color:#fff;box-shadow:0 4px 16px rgba(232,66,42,0.35)}
.games-btn:hover:not(.selected){border-color:rgba(255,255,255,0.2);color:var(--text)}

/* ── MY PRED SUMMARY ── */
.my-pred-bar{
  display:flex;align-items:center;gap:10px;
  background:rgba(61,127,255,0.08);border:1px solid rgba(61,127,255,0.2);
  border-radius:12px;padding:10px 12px;margin-top:10px;
}
.my-pred-icon{font-size:16px}
.my-pred-text{font-size:13px;font-weight:600;flex:1}
.my-pred-sub{font-size:11px;color:var(--muted)}

/* ── REVEAL ROW ── */
.reveal-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
.reveal-row:last-child{border-bottom:none}
.reveal-av{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}

/* ── PTS CHIPS ── */
.pts-chips{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px}
.pts-chip{font-size:11px;padding:3px 9px;border-radius:999px;border:1px solid var(--border);color:var(--muted);background:rgba(255,255,255,0.05)}
.pts-chip.hit{background:rgba(29,185,84,0.12);border-color:rgba(29,185,84,0.28);color:var(--green)}

/* ── RESULT BOX ── */
.result-box{
  background:rgba(29,185,84,0.08);border:1px solid rgba(29,185,84,0.2);
  border-radius:12px;padding:10px 14px;margin-bottom:12px;
  display:flex;align-items:center;gap:10px;
}
.result-box-trophy{font-size:18px}
.result-box-text{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:800;text-transform:uppercase;color:var(--green)}

/* ── ONBOARD ── */
.onboard-screen{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  padding:24px;position:relative;
}
.onboard-screen::before{
  content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse 80% 50% at 50% 0%,rgba(232,66,42,0.2),transparent 60%);
  pointer-events:none;
}
.onboard-box{
  width:100%;max-width:390px;
  background:var(--card);border:1px solid var(--border2);
  border-radius:28px;padding:28px 24px;position:relative;z-index:1;
  box-shadow:0 30px 80px rgba(0,0,0,0.6);
}
.onboard-hero{text-align:center;margin-bottom:28px}
.onboard-ball{font-size:56px;line-height:1;margin-bottom:12px;display:block;
  filter:drop-shadow(0 0 30px rgba(232,66,42,0.5))}
.onboard-title{
  font-family:'Barlow Condensed',sans-serif;font-size:42px;font-weight:900;
  text-transform:uppercase;letter-spacing:0.04em;line-height:1;
}
.onboard-title em{color:var(--accent);font-style:normal}
.onboard-sub{font-size:13px;color:var(--muted);margin-top:8px}

/* ── TAB PILLS ── */
.tab-pills{display:flex;background:rgba(255,255,255,0.05);border-radius:12px;padding:3px;margin-bottom:20px}
.tab-pill{flex:1;padding:8px;border-radius:9px;border:none;background:transparent;
  color:var(--muted);font-family:'Barlow',sans-serif;font-size:13px;font-weight:600;
  cursor:pointer;transition:all .2s}
.tab-pill.active{background:var(--card2);color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,0.3)}

/* ── PLAYER SELECT GRID ── */
.player-grid{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
.player-select-btn{
  display:flex;align-items:center;gap:10px;
  padding:10px 14px;border-radius:12px;
  border:1.5px solid var(--border2);background:rgba(255,255,255,0.03);
  color:var(--text);cursor:pointer;transition:all .18s;text-align:left;
  font-family:'Barlow',sans-serif;font-size:14px;font-weight:600;
}
.player-select-btn:hover{border-color:rgba(255,255,255,0.2);background:rgba(255,255,255,0.07)}
.player-select-btn.selected{border-color:var(--accent);background:rgba(232,66,42,0.1);color:#fff}

/* ── PIN INPUT ── */
.pin-input{
  letter-spacing:8px;font-size:24px;text-align:center;
  font-family:'DM Mono',monospace;
}

/* ── ADMIN ── */
.admin-tabs{display:flex;gap:6px;padding:12px 12px 0}
.admin-result-box{background:rgba(255,255,255,0.04);border-radius:12px;padding:12px;margin-bottom:8px}

/* ── GAME ROW ── */
.game-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px}
.game-row:last-child{border-bottom:none}

/* ── PUSH BANNER ── */
#push-banner{
  position:fixed;bottom:72px;left:50%;transform:translateX(-50%);
  z-index:290;width:calc(100% - 24px);max-width:440px;
  background:linear-gradient(135deg,rgba(20,20,35,0.97),rgba(12,12,20,0.97));
  border:1px solid rgba(61,127,255,0.35);border-radius:16px;
  padding:12px 14px;display:flex;align-items:center;gap:10px;
  box-shadow:0 8px 32px rgba(0,0,0,0.5);
  animation:bannerIn .35s cubic-bezier(.34,1.56,.64,1) forwards;
}
#push-banner-icon{font-size:22px;flex-shrink:0}
#push-banner-text{flex:1;font-size:13px;font-weight:600;line-height:1.3}
#push-banner-sub{font-size:11px;color:var(--muted);font-weight:400}
#push-banner-btn{
  background:var(--blue);border:none;border-radius:10px;
  color:#fff;font-size:12px;font-weight:700;padding:8px 14px;
  cursor:pointer;white-space:nowrap;flex-shrink:0;
}
#push-banner-close{
  font-size:14px;color:var(--muted);cursor:pointer;
  background:none;border:none;padding:4px;flex-shrink:0;
}

/* ── TOAST ── */
#toast{
  position:fixed;bottom:84px;left:50%;transform:translateX(-50%) translateY(16px);
  background:rgba(20,20,32,0.96);border:1px solid var(--border2);
  border-radius:999px;padding:10px 20px;font-size:13px;font-weight:500;color:var(--text);
  opacity:0;transition:all .28s cubic-bezier(.34,1.56,.64,1);z-index:999;
  white-space:nowrap;pointer-events:none;backdrop-filter:blur(12px);
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── LOADING ── */
.load-screen{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;gap:14px;
}
.spinner{
  width:40px;height:40px;border-radius:50%;
  border:3px solid var(--border2);border-top-color:var(--accent);
  animation:spin .65s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.load-label{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted)}

/* ── EMPTY ── */
.empty{text-align:center;padding:3rem 1rem;color:var(--muted);font-size:14px}
.empty-icon{font-size:36px;margin-bottom:10px;display:block}

/* ── MISC ── */
.divider{height:1px;background:var(--border);margin:12px 0}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* ── MVP PICKER MODAL ── */
.mvp-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.75);
  z-index:200;display:flex;align-items:flex-end;justify-content:center;
  backdrop-filter:blur(6px);animation:fadeIn .2s ease;
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.mvp-sheet{
  width:100%;max-width:480px;
  background:var(--card2);border-radius:24px 24px 0 0;
  border-top:1px solid var(--border2);
  padding:20px 16px 32px;max-height:88vh;overflow-y:auto;
}
.mvp-sheet-handle{
  width:40px;height:4px;border-radius:2px;
  background:var(--border2);margin:0 auto 20px;
}
.mvp-sheet-title{
  font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900;
  text-transform:uppercase;letter-spacing:0.05em;margin-bottom:4px;
}
.mvp-sheet-sub{font-size:12px;color:var(--muted);margin-bottom:18px}
.mvp-grid{
  display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px;
}
.mvp-card{
  display:flex;flex-direction:column;align-items:center;gap:6px;
  padding:12px 6px 10px;border-radius:14px;
  border:1.5px solid var(--border);background:rgba(255,255,255,0.03);
  cursor:pointer;transition:all .18s;text-align:center;
}
.mvp-card:hover{border-color:var(--border2);background:rgba(255,255,255,0.07)}
.mvp-card.selected{
  border-color:var(--gold);background:rgba(245,197,24,0.12);
  box-shadow:0 0 20px rgba(245,197,24,0.2);
}
.mvp-card-photo{
  width:60px;height:60px;border-radius:50%;overflow:hidden;
  background:rgba(255,255,255,0.06);flex-shrink:0;position:relative;
}
.mvp-card-photo img{
  width:100%;height:100%;object-fit:cover;object-position:top center;
}
.mvp-card-name{
  font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;
  text-transform:uppercase;letter-spacing:0.03em;line-height:1.2;
}
.mvp-card-team{font-size:10px;color:var(--muted)}
.mvp-other-box{
  background:rgba(255,255,255,0.04);border:1.5px solid var(--border2);
  border-radius:14px;padding:12px 14px;margin-bottom:14px;
}
.mvp-other-box.active{border-color:var(--gold)}


/* ── PREDS TABLE OVERLAY ── */
.preds-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.78);
  z-index:200;
  display:flex;
  align-items:center;
  justify-content:center;
  backdrop-filter:blur(8px);
  animation:fadeIn .2s ease;
  padding:16px;
}

.preds-sheet{
  width:min(1100px, 96vw);
  height:min(90vh, 900px);
  background:var(--card2);
  border-radius:24px;
  border:1px solid var(--border2);
  padding:0;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

/* Mobile → reste en bottom sheet */
@media (max-width: 640px){
  .preds-overlay{
    align-items:flex-end;
    padding:0;
  }
  .preds-sheet{
    width:100%;
    height:88vh;
    border-radius:24px 24px 0 0;
    border-left:none;
    border-right:none;
    border-bottom:none;
  }
}
.preds-sheet-handle{
  width:40px;height:4px;border-radius:2px;
  background:var(--border2);margin:0 auto 16px;flex-shrink:0;
}
.preds-sheet-header{
  padding:16px 20px;
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.preds-sheet-title{
  font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900;
  text-transform:uppercase;letter-spacing:0.05em;margin-bottom:2px;
}
.preds-sheet-sub{font-size:12px;color:var(--muted)}
.preds-table-wrap{
  overflow:auto;
  flex:1;
  padding:0 16px 4px;
}

.preds-table{
  border-collapse:separate;
  border-spacing:0;
  width:max-content;
  min-width:100%;
  font-size:13px;
}

.preds-table th{
  position:sticky;
  top:0;
  background:var(--card2);
  font-family:'Barlow Condensed',sans-serif;
  font-weight:800;
  font-size:10px;
  letter-spacing:0.1em;
  text-transform:uppercase;
  color:var(--muted);
  padding:8px 10px;
  text-align:center;
  white-space:nowrap;
  border-bottom:1px solid var(--border2);
  z-index:2;
  min-width:72px;
}

.preds-table th:first-child{
  position:sticky;
  left:0;
  z-index:3;
  background:var(--card2);
  text-align:left;
  min-width:160px;
  padding-left:8px;
  box-shadow:8px 0 16px rgba(0,0,0,0.18);
}

.preds-table td{
  padding:10px 8px;
  text-align:center;
  border-bottom:1px solid var(--border);
  vertical-align:middle;
  white-space:nowrap;
  min-width:72px;
}

.preds-table td:first-child{
  position:sticky;
  left:0;
  z-index:1;
  background:var(--card2);
  text-align:left;
  min-width:160px;
  padding-left:8px;
  box-shadow:8px 0 16px rgba(0,0,0,0.18);
}

.preds-table tbody tr:nth-child(even) td{
  background:rgba(255,255,255,0.015);
}

.preds-table tbody tr:hover td{
  background:rgba(255,255,255,0.04);
}

.preds-table tr:last-child td{
  border-bottom:none;
}
.pt-player{display:flex;align-items:center;gap:7px}
.pt-av{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0}
.pt-name{font-weight:600;font-size:12px;max-width:72px;overflow:hidden;text-overflow:ellipsis}
.pt-cell{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  border-radius:8px;
  padding:5px 8px;
  font-size:11px;
  font-weight:700;
  font-family:'Barlow Condensed',sans-serif;
  letter-spacing:0.02em;
  min-width:44px;
}
.pt-cell.hit{background:rgba(29,185,84,0.15);color:var(--green);border:1px solid rgba(29,185,84,0.3)}
.pt-cell.miss{background:rgba(232,66,42,0.12);color:#ff8068;border:1px solid rgba(232,66,42,0.25)}
.pt-cell.pending{background:rgba(255,255,255,0.05);color:var(--muted);border:1px solid var(--border)}
.pt-cell.empty{background:transparent;color:var(--dim);border:1px dashed rgba(255,255,255,0.08)}
.pt-series{
  font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:800;
  padding:3px 8px;border-radius:8px;
  background:rgba(61,127,255,0.1);color:#9ec4ff;border:1px solid rgba(61,127,255,0.2);
}
.pt-series.series-hit{background:rgba(29,185,84,0.12);color:var(--green);border-color:rgba(29,185,84,0.25)}
.pt-series.series-exact{background:rgba(245,197,24,0.15);color:var(--gold);border-color:rgba(245,197,24,0.3)}
/* result row at top of table */
.preds-table tr.result-row td{
  background:rgba(255,255,255,0.03);font-weight:700;
  position:sticky;top:33px;z-index:1;
  border-bottom:2px solid var(--border2);
}
.preds-table tr.result-row td:first-child{z-index:2}

/* ── AVATAR UPLOAD ── */
.avatar-upload-wrap{
  display:flex;flex-direction:column;align-items:center;gap:10px;margin-bottom:18px;
}
.avatar-upload-preview{
  width:72px;height:72px;border-radius:50%;
  background:rgba(255,255,255,0.07);border:2px dashed var(--border2);
  display:flex;align-items:center;justify-content:center;
  font-size:26px;font-weight:800;cursor:pointer;
  overflow:hidden;position:relative;transition:border-color .2s;
  font-family:'Barlow Condensed',sans-serif;
}
.avatar-upload-preview:hover{border-color:var(--accent);}
.avatar-upload-preview img{width:100%;height:100%;object-fit:cover;}
.avatar-upload-label{font-size:11px;color:var(--muted);text-align:center;}
.avatar-upload-btn{
  font-size:11px;color:var(--accent);background:none;border:none;
  cursor:pointer;text-decoration:underline;padding:0;
}
/* ── RESULT BANNER ── */
@keyframes bannerIn{from{opacity:0;transform:translateY(-24px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes bannerOut{from{opacity:1;transform:translateY(0) scale(1)}to{opacity:0;transform:translateY(-16px) scale(.97)}}
@keyframes confettiDrop{0%{transform:translateY(-10px) rotate(0deg);opacity:1}100%{transform:translateY(70px) rotate(360deg);opacity:0}}
.result-banner{
  position:fixed;top:0;left:0;right:0;z-index:300;
  display:flex;justify-content:center;
  padding:env(safe-area-inset-top,0) 16px 0;
  pointer-events:none;
}
.result-banner-inner{
  margin-top:12px;
  background:linear-gradient(135deg,rgba(20,20,35,0.97),rgba(12,12,20,0.97));
  border:1px solid rgba(245,197,24,0.35);
  border-radius:20px;padding:14px 18px;
  max-width:440px;width:100%;
  box-shadow:0 8px 40px rgba(0,0,0,0.6),0 0 0 1px rgba(245,197,24,0.1);
  animation:bannerIn .35s cubic-bezier(.34,1.56,.64,1) forwards;
  pointer-events:all;
  position:relative;overflow:hidden;
}
.result-banner-inner::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(245,197,24,0.06),transparent 60%);
  pointer-events:none;
}
.result-banner-inner.hiding{animation:bannerOut .3s ease forwards}
.result-banner-title{
  font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:900;
  text-transform:uppercase;letter-spacing:0.04em;color:var(--gold);
  display:flex;align-items:center;gap:8px;margin-bottom:10px;
}
.result-banner-scores{display:flex;flex-direction:column;gap:5px}
.result-banner-row{
  display:flex;align-items:center;gap:8px;font-size:13px;
}
.result-banner-av{
  width:22px;height:22px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:8px;font-weight:800;
}
.result-banner-pts{
  margin-left:auto;font-family:'Barlow Condensed',sans-serif;
  font-size:16px;font-weight:800;
}
.result-banner-close{
  position:absolute;top:10px;right:12px;
  font-size:14px;color:var(--muted);cursor:pointer;
  background:none;border:none;padding:4px;line-height:1;
}
/* ── BANNER PROGRESS BAR ── */
@keyframes bannerProgress{from{width:100%}to{width:0%}}
.result-banner-progress{
  position:absolute;bottom:0;left:0;
  height:3px;border-radius:0 0 20px 20px;
  background:linear-gradient(90deg,var(--gold),var(--accent));
  animation:bannerProgress 4s linear forwards;
  pointer-events:none;
}

/* confetti */
.confetti-piece{
  position:fixed;top:0;width:8px;height:8px;border-radius:2px;
  pointer-events:none;z-index:350;
  animation:confettiDrop 1.2s ease-in forwards;
}

/* ── ROUND RECAP CARD ── */
.round-recap{
  margin:0 12px 10px;
  background:linear-gradient(135deg,rgba(61,127,255,0.1),rgba(232,66,42,0.06));
  border:1px solid rgba(61,127,255,0.25);
  border-radius:var(--r2);padding:16px;
  position:relative;overflow:hidden;
}
.round-recap::before{
  content:'🏅';position:absolute;right:14px;top:10px;
  font-size:52px;opacity:0.08;line-height:1;
}
.round-recap-title{
  font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:800;
  letter-spacing:0.18em;text-transform:uppercase;color:#6aa3ff;margin-bottom:10px;
}
.round-recap-name{
  font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900;
  text-transform:uppercase;margin-bottom:12px;color:var(--text);
}
.round-recap-rows{display:flex;flex-direction:column;gap:6px}
.round-recap-row{
  display:flex;align-items:center;gap:8px;font-size:13px;
}
.round-recap-rank{
  font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:800;
  min-width:20px;color:var(--muted);
}
.round-recap-pts{
  margin-left:auto;font-family:'Barlow Condensed',sans-serif;
  font-size:18px;font-weight:800;
}

/* ── COUNTDOWN ── */
.countdown-badge{
  display:inline-flex;align-items:center;gap:5px;
  font-size:11px;font-weight:700;letter-spacing:0.04em;
  padding:3px 10px;border-radius:999px;
  background:rgba(245,158,11,0.12);border:1px solid rgba(245,158,11,0.3);
  color:var(--amber);font-family:'DM Mono',monospace;
}
.countdown-badge.urgent{
  background:rgba(232,66,42,0.15);border-color:rgba(232,66,42,0.4);color:#ff8068;
  animation:pulse 1s ease-in-out infinite;
}

/* ── RULES OVERLAY ── */
.rules-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.78);
  z-index:200;display:flex;align-items:flex-end;justify-content:center;
  backdrop-filter:blur(8px);animation:fadeIn .2s ease;
}
.rules-sheet{
  width:100%;max-width:480px;
  background:var(--card2);border-radius:24px 24px 0 0;
  border-top:1px solid var(--border2);
  padding:0 0 40px;max-height:92vh;overflow-y:auto;
}
.rules-handle{width:36px;height:4px;border-radius:2px;background:rgba(255,255,255,0.15);margin:12px auto 0}
.rules-hero{
  padding:16px 20px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:14px;
  position:sticky;top:0;z-index:2;background:var(--card2);
}
.rules-title{font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:900;text-transform:uppercase;letter-spacing:0.04em;line-height:1}
.rules-title em{color:var(--accent);font-style:normal}
.rules-close{margin-left:auto;width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,0.08);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;color:var(--muted);flex-shrink:0;transition:all .2s}
.rules-close:hover{background:rgba(255,255,255,0.15);color:var(--text)}
.rules-cards{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:16px 16px 0}
.rules-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:14px}
.rules-card-icon{font-size:22px;margin-bottom:6px;line-height:1}
.rules-card-title{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:800;text-transform:uppercase;letter-spacing:0.04em;margin-bottom:4px}
.rules-card-body{font-size:12px;color:var(--muted);line-height:1.5}
.rules-pts-table{width:100%;border-collapse:collapse;margin-top:8px}
.rules-pts-table th{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:800;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);padding:4px 8px;text-align:left;border-bottom:1px solid var(--border)}
.rules-pts-table td{padding:6px 8px;border-bottom:1px solid rgba(255,255,255,0.04);font-size:12px}
.rules-pts-table td:last-child{text-align:right;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:800;color:var(--gold)}
.rules-section{padding:16px 16px 0}
.rules-section-title{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:800;letter-spacing:0.16em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.rules-section-title::after{content:'';flex:1;height:1px;background:var(--border)}
.rules-detail-row{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);font-size:13px}
.rules-detail-row:last-child{border-bottom:none}
.rules-detail-icon{font-size:16px;flex-shrink:0;margin-top:1px}
.rules-detail-text{flex:1;color:var(--text);line-height:1.5}
.rules-detail-text strong{font-weight:700}
.rules-detail-text em{color:var(--muted);font-style:normal;font-size:11px;display:block;margin-top:2px}
.rules-dd-box{margin:16px 16px 0;background:rgba(245,197,24,0.07);border:1px solid rgba(245,197,24,0.25);border-radius:16px;padding:16px}
.rules-dd-title{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:900;text-transform:uppercase;letter-spacing:0.04em;color:var(--gold);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.rules-dd-row{display:flex;align-items:flex-start;gap:8px;font-size:12px;color:var(--muted);margin-bottom:6px;line-height:1.5}
.rules-dd-row:last-child{margin-bottom:0}
.rules-tip{margin:16px 16px 0;background:rgba(61,127,255,0.07);border:1px solid rgba(61,127,255,0.2);border-radius:14px;padding:14px;font-size:12px;color:var(--muted);line-height:1.7}
.rules-tip strong{color:#6aa3ff}

/* ── DOUBLE DOWN ── */
.dd-btn{
  display:flex;align-items:center;justify-content:center;gap:8px;
  width:100%;padding:12px 16px;margin-top:10px;
  border-radius:14px;border:2px dashed rgba(245,197,24,0.4);
  background:rgba(245,197,24,0.06);
  color:var(--gold);font-family:'Barlow Condensed',sans-serif;
  font-size:15px;font-weight:800;text-transform:uppercase;letter-spacing:0.06em;
  cursor:pointer;transition:all .2s;
}
.dd-btn:hover{border-color:rgba(245,197,24,0.7);background:rgba(245,197,24,0.12);transform:translateY(-1px)}
.dd-btn:active{transform:translateY(0)}
.dd-btn.active{
  border-style:solid;border-color:var(--gold);
  background:rgba(245,197,24,0.14);
  box-shadow:0 0 24px rgba(245,197,24,0.2);
}
.dd-badge{
  display:inline-flex;align-items:center;gap:5px;
  font-size:11px;font-weight:800;letter-spacing:0.06em;text-transform:uppercase;
  padding:3px 10px;border-radius:999px;
  background:rgba(245,197,24,0.15);border:1px solid rgba(245,197,24,0.4);
  color:var(--gold);
}
.dd-info-box{
  display:flex;align-items:center;gap:8px;
  background:rgba(245,197,24,0.07);border:1px solid rgba(245,197,24,0.2);
  border-radius:10px;padding:8px 12px;margin-top:8px;
  font-size:12px;color:var(--gold);
}

/* ── PLAYER PROFILE SHEET ── */
.profile-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.78);
  z-index:200;display:flex;align-items:flex-end;justify-content:center;
  backdrop-filter:blur(8px);animation:fadeIn .2s ease;
}
.profile-sheet{
  width:100%;max-width:480px;
  background:var(--card2);border-radius:24px 24px 0 0;
  border-top:1px solid var(--border2);
  padding:0 0 36px;max-height:92vh;overflow-y:auto;
}
.profile-hero{
  position:relative;padding:28px 20px 20px;
  background:linear-gradient(160deg,rgba(232,66,42,0.12),rgba(61,127,255,0.07));
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:16px;
}
.profile-avatar{
  width:64px;height:64px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:800;
  border:2px solid rgba(255,255,255,0.15);
}
.profile-name{
  font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:900;
  text-transform:uppercase;letter-spacing:0.04em;line-height:1;
}
.profile-sub{font-size:12px;color:var(--muted);margin-top:4px}
.profile-close{
  position:absolute;top:16px;right:16px;
  width:32px;height:32px;border-radius:50%;
  background:rgba(255,255,255,0.08);border:1px solid var(--border2);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:16px;color:var(--muted);
  transition:all .2s;
}
.profile-close:hover{background:rgba(255,255,255,0.15);color:var(--text)}
.profile-stats-grid{
  display:grid;grid-template-columns:repeat(4,1fr);gap:1px;
  background:var(--border);border-bottom:1px solid var(--border);
}
.profile-stat{
  background:var(--card2);padding:14px 8px;text-align:center;
}
.profile-stat-num{
  font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:800;
  line-height:1;margin-bottom:3px;
}
.profile-stat-lbl{font-size:9px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted)}
.profile-series-row{
  display:flex;align-items:flex-start;gap:12px;
  padding:12px 20px;border-bottom:1px solid var(--border);
}
.profile-series-row:last-child{border-bottom:none}
.profile-series-icon{
  width:36px;height:36px;border-radius:10px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:16px;
  margin-top:2px;
}
.profile-series-teams{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:800;text-transform:uppercase}
.profile-series-pred{font-size:12px;color:var(--muted);margin-top:2px}
.profile-series-result{font-size:11px;margin-top:3px}
.profile-pts-badge{
  margin-left:auto;flex-shrink:0;
  font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;
  min-width:40px;text-align:right;
}
.profile-accuracy-bar{
  height:6px;border-radius:3px;background:var(--border2);

<body>
<div id="root"></div>
<script>
// ══════════════════════════════════════════════════
// CONFIG — remplace par tes clés Supabase
// ══════════════════════════════════════════════════
const SUPABASE_URL = 'https://xuqjqnjsjwzryqdnuqgl.supabase.co';
const SUPABASE_KEY = 'sb_publishable_38VfDqnFBj7E8EpAtW38nA_m7zAntx8';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const APP_VERSION = '2026-04-13-01';
const SW_URL = `./sw.js?v=${APP_VERSION}`;

// ── PUSH NOTIFICATIONS ──
const VAPID_PUBLIC_KEY = 'BALx86LdkdnnPWBBZDTusT79ALqChv0VL8OdWJi0MYAh7s0spBG4VIEZvXctk71uELFoh9Uj1wi_PlzVDtBrO90';

// ══════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════
let state = {
  loading:true, currentPage:'leaderboard',
  currentPlayer:null, showOnboarding:false,
  onboardLogin:false, selectedLoginPlayer:null,
  adminAuthed:false, adminPage:'series',
  series:[], games:{}, predictions:[],
  players:[], settings:{}, leaderboard: [],
  mvpPredictions: [],
  championPredictions: [],
  doubleDowns: [],
  pushStatus: 'off' // 'on' | 'off' | 'denied' | 'unsupported' — mis à jour de façon async, jamais en plein render
};

// Temp state for in-progress predictions (survives re-renders)
const predTemp = {};
// Accordion open state for series page (survives re-renders)
const seriesPageOpen = {};
const editMode = {};
let skipNextSeriesRealtime = 0;
let skipNextGamesRealtime = 0;
let skipNextPredictionRealtime = 0;
let skipNextPlayersRealtime = 0;
let skipNextSettingsRealtime = 0;

// ══════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════
async function init() {
  const saved = localStorage.getItem('nba26_player');
  if (saved) try { state.currentPlayer = JSON.parse(saved); } catch(e){}
  await loadAll();
  // Charger le statut push UNE FOIS avant le premier render → plus de flash
  state.pushStatus = await getPushStatus();
  subscribeRealtime();
  state.loading = false;
  initFinishedSeriesCache();
  startCountdownTicker();
  if (!state.currentPlayer) {
    state.showOnboarding = true;
    state.onboardLogin = state.players.length > 0;
  } else {
    // Re-validate player still exists
    const still = state.players.find(p => p.id === state.currentPlayer.id);
    if (!still) { state.currentPlayer=null; state.showOnboarding=true; state.onboardLogin=state.players.length>0; }
    else state.currentPlayer = still; // refresh data
  }
  render();
}

async function loadAll() {
  await Promise.all([
    loadSettings(),
    loadSeries(),
    loadPlayers(),
    loadPredictions(),
    loadMvpPredictions(),
    loadChampionPredictions(),
    loadDoubleDowns()
  ]);
  computeLeaderboard();
}

async function loadSettings() {
  state.settings = {};
  const { data, error } = await sb.from('settings').select('*');

  if (error) {
    console.error(error);
    return;
  }

  (data || []).forEach(r => {
    try {
      state.settings[r.key] = JSON.parse(r.value);
    } catch {
      state.settings[r.key] = r.value;
    }
  });
}
async function loadSeries() {
  const {data} = await sb.from('series').select('*').order('created_at',{ascending:true});
  state.series = data||[];
  const {data:games} = await sb.from('games').select('*').order('game_number');
  state.games = {};
  (games||[]).forEach(g=>{ if(!state.games[g.series_id]) state.games[g.series_id]=[]; state.games[g.series_id].push(g); });
}
async function loadPlayers() {
  const {data} = await sb.from('players').select('*').order('created_at');
  state.players = data||[];
}
async function loadPredictions() {
  const {data} = await sb.from('predictions').select('*');
  state.predictions = data||[];
}

async function loadMvpPredictions() {
  const { data } = await sb
    .from('mvp_predictions')
    .select('*')
    .order('updated_at', { ascending: false });

  state.mvpPredictions = data || [];
}

async function loadChampionPredictions() {
  const { data } = await sb
    .from('champion_predictions')
    .select('*')
    .order('updated_at', { ascending: false });
  state.championPredictions = data || [];
}

async function loadDoubleDowns() {
  const { data } = await sb.from('double_down').select('*');
  state.doubleDowns = data || [];
}

// ══════════════════════════════════════════════════
// DOUBLE DOWN LOGIC
// ══════════════════════════════════════════════════
function getDoubleDown(playerId, seriesId) {
  return state.doubleDowns.find(d => d.player_id === playerId && d.series_id === seriesId);
}
function myDoubleDown(seriesId) {
  if (!state.currentPlayer) return null;
  return getDoubleDown(state.currentPlayer.id, seriesId);
}
// Returns the double down the current player used anywhere in the tournament
function myDoubleDownForRound(round) {
  // kept for compatibility — now checks the whole tournament
  if (!state.currentPlayer) return null;
  return state.doubleDowns.find(d => d.player_id === state.currentPlayer.id) || null;
}
// Has the current player already used their (unique) double down on a different series?
function doubleDownUsedElsewhere(round, seriesId) {
  if (!state.currentPlayer) return false;
  return state.doubleDowns.some(d => d.player_id === state.currentPlayer.id && d.series_id !== seriesId);
}

async function toggleDoubleDown(seriesId) {
  if (!state.currentPlayer) return;
  const s = state.series.find(x => x.id === seriesId);
  if (!s) return;
  if (isLockedSeriesForMyPick(s)) { toast('🔒 Série verrouillée, impossible de modifier.'); return; }

  const existing = myDoubleDown(seriesId);

  if (existing) {
    // Remove it
    const { error } = await sb.from('double_down').delete().eq('id', existing.id);
    if (error) { toast('❌ Erreur suppression bonus'); return; }
    toast('↩️ Bonus risqué retiré');
  } else {
    // Check quota: only 1 per round
    if (doubleDownUsedElsewhere(s.round, seriesId)) {
      toast('⚠️ Tu as déjà utilisé ton bonus risqué pour ce tournoi !');
      return;
    }
    const { error } = await sb.from('double_down').insert({
      player_id: state.currentPlayer.id,
      series_id: seriesId,
      playoff_round: s.round
    });
    if (error) { toast('❌ Erreur activation bonus'); return; }
    toast('🎲 Bonus risqué activé ! Tes points seront doublés si tu as raison.');
  }

  await loadDoubleDowns();
  computeLeaderboard();
  render();
}

// ── BUG FIX: compute leaderboard client-side so it's always fresh ──
function computeLeaderboard() {
  const ptsMvpR1 = Number(state.settings['points_mvp_premier_tour'] ?? 1);
  const ptsMvpSF = Number(state.settings['points_mvp_demi_finales'] ?? 2);
  const ptsMvpCF = Number(state.settings['points_mvp_finales_conference'] ?? 4);
  const ptsMvpFN = Number(state.settings['points_mvp_finales_nba'] ?? 8);
  const actualMvp = String(state.settings['actual_mvp'] ?? '').trim().toLowerCase();
  const ptsChampR1 = Number(state.settings['points_champion_premier_tour'] ?? 1);
  const ptsChampSF = Number(state.settings['points_champion_demi_finales'] ?? 2);
  const ptsChampCF = Number(state.settings['points_champion_finales_conference'] ?? 4);
  const ptsChampFN = Number(state.settings['points_champion_finales_nba'] ?? 8);
  const actualChampion = String(state.settings['actual_champion'] ?? '').trim().toLowerCase();

  const map = {};

  state.players.forEach(p => {
    map[p.id] = {
      id: p.id,
      name: p.name,
      avatar_color: p.avatar_color,
      avatar_url: p.avatar_url || null,
      total_points: 0,
      points_series_winner: 0,
      points_series_exact: 0,
      points_games: 0,
      points_mvp: 0,
      points_champion: 0,
      predictions_count: 0,
      correct_predictions: 0
    };
  });

  state.predictions.forEach(pred => {
    const entry = map[pred.player_id];
    if (!entry) return;

    entry.predictions_count++;

    const s = state.series.find(x => x.id === pred.series_id);
    if (!s) return;

    const roundPoints = getRoundPoints(s.round);
    const ptsMW = roundPoints.match;
    const ptsSW = roundPoints.series;
    const ptsSE = roundPoints.exact;

    let sw = 0;
    let se = 0;
    let sg = 0;

    const seriesGames = state.games[s.id] || [];
    const gamePreds = Array.isArray(pred.game_predictions) ? pred.game_predictions : [];

    seriesGames.forEach(g => {
      if (g.status !== 'finished' || !g.winner) return;

      const gp = gamePreds.find(x => Number(x.game_number) === Number(g.game_number));
      if (gp && gp.predicted_winner === g.winner) {
        sg += ptsMW;
      }
    });

    if (s.status === 'finished' && s.series_winner) {
      if (pred.predicted_series_winner === s.series_winner) {
        sw = ptsSW;

        if (Number(pred.predicted_series_games) === Number(s.series_games)) {
          se = ptsSE;
        }
      }
    }

    if (sw > 0 || se > 0 || sg > 0) {
      entry.correct_predictions++;
    }

    // Double down: if active on this series AND series winner was correct → double all points from this series
    const dd = state.doubleDowns.find(d => d.player_id === pred.player_id && d.series_id === s.id);
    if (dd && sw > 0) {
      // Only doubles points when the series winner was right
      sg = sg * 2;
      sw = sw * 2;
      se = se * 2;
    }

    entry.points_games += sg;
    entry.points_series_winner += sw;
    entry.points_series_exact += se;
    entry.total_points += sg + sw + se;
  });

  state.mvpPredictions.forEach(pred => {
    const entry = map[pred.player_id];
    if (!entry) return;
    if (!actualMvp) return;

    const predictedMvp = String(pred.predicted_mvp ?? '').trim().toLowerCase();
    if (!predictedMvp) return;
    if (predictedMvp !== actualMvp) return;

    let pts = 0;

    if (pred.playoff_round === 'Premier tour') pts = ptsMvpR1;
    else if (pred.playoff_round === 'Demi-finales') pts = ptsMvpSF;
    else if (pred.playoff_round === 'Finales de conférence') pts = ptsMvpCF;
    else if (pred.playoff_round === 'Finales NBA') pts = ptsMvpFN;

    entry.points_mvp += pts;
    entry.total_points += pts;

    if (pts > 0) {
      entry.correct_predictions++;
    }
  });

  state.championPredictions.forEach(pred => {
    const entry = map[pred.player_id];
    if (!entry) return;
    if (!actualChampion) return;
    const predicted = String(pred.predicted_champion ?? '').trim().toLowerCase();
    if (!predicted || predicted !== actualChampion) return;
    let pts = 0;
    if (pred.playoff_round === 'Premier tour') pts = ptsChampR1;
    else if (pred.playoff_round === 'Demi-finales') pts = ptsChampSF;
    else if (pred.playoff_round === 'Finales de conférence') pts = ptsChampCF;
    else if (pred.playoff_round === 'Finales NBA') pts = ptsChampFN;
    entry.points_champion += pts;
    entry.total_points += pts;
    if (pts > 0) entry.correct_predictions++;
  });

  state.leaderboard = Object.values(map).sort((a, b) => b.total_points - a.total_points);
}

// ══════════════════════════════════════════════════
// REALTIME
// ══════════════════════════════════════════════════
function subscribeRealtime() {
  sb.channel('db-all')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'series' }, async () => {
      if (state.loading) return;
      if (skipNextSeriesRealtime > 0) { skipNextSeriesRealtime--; return; }
      // ⚠️ Capturer le snapshot AVANT le reload — sinon la comparaison rate toujours
      const snapshotBefore = new Set(state.series.filter(s => s.status === 'finished').map(s => s.id));
      await loadSeries();
      await loadPredictions();
      computeLeaderboard();
      // Passer le snapshot "avant" pour détecter les nouvelles séries finished
      checkAndShowResultBanner(snapshotBefore);
      render();
    })
    .on('postgres_changes', { event: '*', schema: 'public', table: 'games' }, async () => {
      if (state.loading) return;
      if (skipNextGamesRealtime > 0) { skipNextGamesRealtime--; return; }
      await loadSeries();
      await loadPredictions();
      computeLeaderboard();
      render();
    })
    .on('postgres_changes', { event: '*', schema: 'public', table: 'predictions' }, async () => {
      if (state.loading) return;
      if (skipNextPredictionRealtime > 0) { skipNextPredictionRealtime--; return; }
      await loadPredictions();
      computeLeaderboard();
      render();
    })
    .on('postgres_changes', { event: '*', schema: 'public', table: 'players' }, async () => {
      if (state.loading) return;
      if (skipNextPlayersRealtime > 0) { skipNextPlayersRealtime--; return; }
      await loadPlayers();
      await loadPredictions();
      computeLeaderboard();
      // Re-valider que le joueur connecté existe toujours
      if (state.currentPlayer) {
        const still = state.players.find(p => p.id === state.currentPlayer.id);
        if (!still) {
          state.currentPlayer = null;
          localStorage.removeItem('nba26_player');
          state.showOnboarding = true;
          state.onboardLogin = state.players.length > 0;
        } else {
          state.currentPlayer = still;
        }
      }
      render();
    })
    .on('postgres_changes', { event: '*', schema: 'public', table: 'settings' }, async () => {
      if (state.loading) return;
      if (skipNextSettingsRealtime > 0) { skipNextSettingsRealtime--; return; }
      await loadSettings();
      computeLeaderboard();
      render();
    })
    .on('postgres_changes', { event: '*', schema: 'public', table: 'mvp_predictions' }, async () => {
      if (state.loading) return;
      await loadMvpPredictions();
      computeLeaderboard();
      render();
    })
    .on('postgres_changes', { event: '*', schema: 'public', table: 'champion_predictions' }, async () => {
      if (state.loading) return;
      await loadChampionPredictions();
      computeLeaderboard();
      render();
    })
    .on('postgres_changes', { event: '*', schema: 'public', table: 'double_down' }, async () => {
      if (state.loading) return;
      await loadDoubleDowns();
      computeLeaderboard();
      render();
    })
    .subscribe();
}

// ══════════════════════════════════════════════════
// 1. BANNIÈRE DE RÉSULTAT — avec file d'attente et rattrapage des bannières manquées
// ══════════════════════════════════════════════════

// Clé localStorage par joueur — chaque compte a son propre historique de bannières vues
function _seenKey() {
  const pid = state.currentPlayer?.id || 'anonymous';
  return 'nba26_seen_finished_' + pid;
}
function _getSeenIds() {
  try { return new Set(JSON.parse(localStorage.getItem(_seenKey()) || '[]')); }
  catch { return new Set(); }
}
function _markSeen(id) {
  const seen = _getSeenIds();
  seen.add(id);
  localStorage.setItem(_seenKey(), JSON.stringify([...seen]));
}

// Cache pour le realtime : snapshot des finished juste avant chaque reload
let _lastFinishedSeriesIds = new Set();

// File d'attente des bannières à afficher
let _bannerQueue = [];
let _bannerRunning = false;
let _currentBannerSeriesId = null;

function _enqueueBanners(seriesList, missed = false) {
  _bannerQueue.push(...seriesList.map(s => ({ series: s, missed })));
  if (!_bannerRunning) _drainBannerQueue();
}

function _drainBannerQueue() {
  if (_bannerQueue.length === 0) { _bannerRunning = false; return; }
  _bannerRunning = true;
  const { series, missed } = _bannerQueue.shift();
  showResultBanner(series, missed);
  // Attendre 8.5s (durée auto-dismiss + marge) avant la suivante
  setTimeout(_drainBannerQueue, 4500);
}

// Appelée au boot — initialise le cache ET rejoue les bannières manquées
function initFinishedSeriesCache() {
  const seen = _getSeenIds();
  const nowFinished = state.series.filter(s => s.status === 'finished');

  // Séries finies pas encore vues = bannières manquées
  const missed = nowFinished.filter(s => !seen.has(s.id));

  // Initialise le cache realtime avec l'état actuel
  _lastFinishedSeriesIds = new Set(nowFinished.map(s => s.id));

  if (missed.length > 0) {
    // Petit délai pour laisser l'UI se rendre d'abord
    setTimeout(() => _enqueueBanners(missed, true), 800);
  }
}

// Appelée à chaque event realtime sur la table series
function checkAndShowResultBanner(snapshotBefore) {
  // Utilise le snapshot passé en paramètre (capturé avant loadSeries)
  // ou le cache interne si appelé sans argument
  const ref = snapshotBefore || _lastFinishedSeriesIds;
  const nowFinished = state.series.filter(s => s.status === 'finished');
  const newlyFinished = nowFinished.filter(s => !ref.has(s.id));
  // Met à jour le cache interne
  _lastFinishedSeriesIds = new Set(nowFinished.map(s => s.id));
  if (newlyFinished.length > 0) _enqueueBanners(newlyFinished, false);
}

function showResultBanner(series, missed = false) {
  // Calcule les points gagnés par chaque joueur sur cette série
  const ap = state.predictions.filter(p => p.series_id === series.id);
  const roundPts = getRoundPoints(series.round);

  const rows = ap.map(pred => {
    const pl = getPlayer(pred.player_id);
    if (!pl) return null;
    const winOk = pred.predicted_series_winner === series.series_winner;
    const exactOk = winOk && Number(pred.predicted_series_games) === Number(series.series_games);
    const sGames = state.games[series.id] || [];
    const gPreds = pred.game_predictions || [];
    let ptsSW = winOk ? roundPts.series : 0;
    let ptsSE = exactOk ? roundPts.exact : 0;
    let ptsG = 0;
    sGames.forEach(g => {
      if (g.status !== 'finished' || !g.winner) return;
      const gp = gPreds.find(x => Number(x.game_number) === Number(g.game_number));
      if (gp && gp.predicted_winner === g.winner) ptsG += roundPts.match;
    });
    const dd = state.doubleDowns.find(d => d.player_id === pred.player_id && d.series_id === series.id);
    if (dd && winOk) { ptsSW *= 2; ptsSE *= 2; ptsG *= 2; }
    const total = ptsSW + ptsSE + ptsG;
    return { pl, total, winOk, ddActive: !!dd && winOk };
  }).filter(Boolean).sort((a, b) => b.total - a.total);

// 2. RÉCAPITULATIF DE FIN DE ROUND
// ══════════════════════════════════════════════════
function getRoundRecap(round) {
  // Tous les joueurs, points gagnés uniquement sur ce round
  const seriesOfRound = state.series.filter(s => s.round === round && s.status === 'finished');
  if (!seriesOfRound.length) return null;

  const playerPoints = {};
  state.players.forEach(p => { playerPoints[p.id] = 0; });

  seriesOfRound.forEach(s => {
    const roundPts = getRoundPoints(s.round);
    const ap = state.predictions.filter(p => p.series_id === s.id);
    ap.forEach(pred => {
      if (!playerPoints.hasOwnProperty(pred.player_id)) return;
      const winOk = pred.predicted_series_winner === s.series_winner;
      const exactOk = winOk && Number(pred.predicted_series_games) === Number(s.series_games);
      const sGames = state.games[s.id] || [];
      const gPreds = pred.game_predictions || [];
      let sw = winOk ? roundPts.series : 0;
      let se = exactOk ? roundPts.exact : 0;
      let sg = 0;
      sGames.forEach(g => {
        if (g.status !== 'finished' || !g.winner) return;
        const gp = gPreds.find(x => Number(x.game_number) === Number(g.game_number));
        if (gp && gp.predicted_winner === g.winner) sg += roundPts.match;
      });
      const dd = state.doubleDowns.find(d => d.player_id === pred.player_id && d.series_id === s.id);
      if (dd && winOk) { sw *= 2; se *= 2; sg *= 2; }
      playerPoints[pred.player_id] += sw + se + sg;
    });
  });

  return state.players
    .map(p => ({ player: p, pts: playerPoints[p.id] || 0 }))
    .sort((a, b) => b.pts - a.pts);
}

function renderRoundRecapCard(round) {
  // N'afficher que si le round est entièrement terminé
  const seriesOfRound = state.series.filter(s => s.round === round);
  if (!seriesOfRound.length) return '';
  const allDone = seriesOfRound.every(s => s.status === 'finished');
  if (!allDone) return '';

  const recap = getRoundRecap(round);
  if (!recap) return '';

  const ROUND_EMOJI = {
    'Premier tour': '🥊', 'Demi-finales': '⚡',
    'Finales de conférence': '🔥', 'Finales NBA': '👑'
  };

  const rows = recap.map((r, i) => {
    const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `${i+1}.`;
    return `
      <div class="round-recap-row">
        <span class="round-recap-rank">${medal}</span>
        ${avatarImg(r.player, '24px')}
        <span style="font-weight:600;font-size:13px">${r.player.name}</span>
        <span class="round-recap-pts" style="color:${r.pts > 0 ? 'var(--blue)' : 'var(--muted)'}">
          ${r.pts > 0 ? '+' + r.pts : '—'}
        </span>
      </div>`;
  }).join('');

  return `
    <div class="round-recap">
      <div class="round-recap-title">${ROUND_EMOJI[round] || '🏅'} Récap du round</div>
      <div class="round-recap-name">${round}</div>
      <div class="round-recap-rows">${rows}</div>
    </div>`;
}

// 3. COMPTE À REBOURS
// ══════════════════════════════════════════════════
function formatCountdown(targetIso) {
  const diff = new Date(targetIso) - new Date();
  if (diff <= 0) return null;
  const totalSec = Math.floor(diff / 1000);
  const days = Math.floor(totalSec / 86400);
  const hours = Math.floor((totalSec % 86400) / 3600);
  const mins = Math.floor((totalSec % 3600) / 60);
  const secs = totalSec % 60;
  const urgent = diff < 3600000; // moins d'1h

  let label = '';
  if (days > 0) label = `${days}j ${hours}h ${mins}m`;
  else if (hours > 0) label = `${hours}h ${mins}m`;
  else if (mins > 0) label = `${mins}m ${String(secs).padStart(2,'0')}s`;
  else label = `${secs}s`;

  return { label, urgent };
}

// Met à jour tous les comptes à rebours en live sans re-render
function tickCountdowns() {
  document.querySelectorAll('[data-countdown]').forEach(el => {
    const iso = el.dataset.countdown;
    const result = formatCountdown(iso);
    if (!result) {
      el.textContent = '🔒 Verrouillé';
      el.className = 'countdown-badge urgent';
    } else {
      el.textContent = '⏳ ' + result.label;
      el.className = 'countdown-badge' + (result.urgent ? ' urgent' : '');
    }
  });
}

// Lance le ticker toutes les secondes
function startCountdownTicker() {
  setInterval(tickCountdowns, 1000);
}

function countdownBadgeHTML(startTimeIso) {
  if (!startTimeIso) return '';
  const result = formatCountdown(startTimeIso);
  if (!result) return `<span class="countdown-badge urgent">🔒 Verrouillé</span>`;
  return `<span class="countdown-badge${result.urgent ? ' urgent' : ''}" data-countdown="${startTimeIso}">⏳ ${result.label}</span>`;
}

async function hashPin(pin) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pin));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
function toast(msg, ms=2800) {
  const el=document.getElementById('toast');
  if(!el)return; el.textContent=msg; el.classList.add('show');
  clearTimeout(el._t); el._t=setTimeout(()=>el.classList.remove('show'),ms);
}

}

function getChampionPredForRound(playerId, round) {
  return state.championPredictions.find(
    p => p.player_id === playerId && p.playoff_round === round
  );
}

function myChampionPred(round) {
  if (!state.currentPlayer) return null;
  return getChampionPredForRound(state.currentPlayer.id, round);
}

function isChampionLocked(round) {
  const seriesOfRound = state.series.filter(s => s.round === round);
  if (!seriesOfRound.length) return false;

  // Si au moins une série du round est verrouillée/terminée manuellement
  if (seriesOfRound.some(s => s.status === 'locked' || s.status === 'finished')) return true;

  // Si au moins un match du round a été validé
  const hasValidatedGame = seriesOfRound.some(s => {
    const seriesGames = state.games[s.id] || [];
    return seriesGames.some(g => g.status === 'finished');
  });
  if (hasValidatedGame) return true;

  // Verrouillage automatique à la date de début
  const earliestStart = seriesOfRound.map(s => s.start_time).filter(Boolean).sort()[0];
  if (!earliestStart) return false;
  return new Date() >= new Date(earliestStart);
}

// Get all teams still alive at a given round (appeared in that round or later)
function getTeamsForRound(round) {
  const roundOrder = ['Premier tour', 'Demi-finales', 'Finales de conférence', 'Finales NBA'];
  const idx = roundOrder.indexOf(round);
  // All teams in series from this round onwards
  const teams = new Set();
  state.series
    .filter(s => roundOrder.indexOf(s.round) >= idx)
    .forEach(s => {
      if (s.team1 && s.team1 !== 'À déterminer') teams.add(s.team1);
      if (s.team2 && s.team2 !== 'À déterminer') teams.add(s.team2);
    });
  return [...teams].sort();
}

  if (seriesOfRound.some(s => s.status === 'locked' || s.status === 'finished')) return true;

      exact: Number(state.settings['points_series_exact_demi_finales'] ?? 5),

    'Finales de conférence': {

      series: Number(state.settings['points_series_winner_finales_nba'] ?? 3),
      exact: Number(state.settings['points_series_exact_finales_nba'] ?? 5),

  };

  return map[round] || { match: 2, series: 3, exact: 5 };
}

async function uploadAvatar(file, playerId) {
  if (!file) return null;
  if (file.size > 3 * 1024 * 1024) { toast('❌ Image trop lourde (max 3 Mo)'); return null; }
  const ext = file.name.split('.').pop().toLowerCase();
  if (!['jpg','jpeg','png','webp','gif'].includes(ext)) { toast('❌ Format non supporté (jpg, png, webp)'); return null; }
  const path = `${playerId}/avatar.${ext}`;
  const { error } = await sb.storage.from('avatars').upload(path, file, { upsert: true });
  if (error) { console.error(error); toast('❌ Erreur upload photo : ' + error.message); return null; }
  const { data } = sb.storage.from('avatars').getPublicUrl(path);
  // Ajouter un timestamp pour forcer le rechargement de l'image (cache-bust)
  return data.publicUrl + '?t=' + Date.now();
}

const ROUND_NEXT = {
  'Premier tour': 'Demi-finales',
  'Demi-finales': 'Finales de conférence',

async function setSeriesResult(id, winner, games) {
  try {
    const { error: e1 } = await sb
      .from('series')
      .update({
        series_winner: winner,
        series_games: Number(games),
        status: 'finished'
      })
      .eq('id', id);

    if (e1) {
      console.error(e1);
      toast('❌ Erreur mise à jour série');
      return;
    }

    try { await sb.rpc('recalculate_points', { p_series_id: id }); } catch(e) { console.warn('RPC serie:', e); }

    // Snapshot AVANT reload pour détecter la nouvelle série finished
    const snapshotBefore = new Set(state.series.filter(s => s.status === 'finished').map(s => s.id));

    await loadSeries();
    const finishedSeries = state.series.find(s => s.id === id);
    if (finishedSeries) await autoAdvanceToNextRound(finishedSeries, winner);

    await loadSeries();
    await loadPredictions();
    computeLeaderboard();
    // Déclencher la bannière pour l'admin aussi (il ne reçoit pas son propre event realtime)
    checkAndShowResultBanner(snapshotBefore);
    // Sauter l'event realtime qui va arriver (bannière déjà affichée)
    skipNextSeriesRealtime += 1;
    render();
    toast('🏆 Résultat enregistré !');
  } catch (err) {
    console.error('setSeriesResult crash:', err);
    toast('❌ Erreur JS lors de la validation');
  }
}

async function setGameResult(gameId, seriesId, winner) {
  try {
    const { error } = await sb
      .from('games')
      .update({
        winner,
        status: 'finished'
      })
      .eq('id', gameId);

    if (error) {
      console.error(error);
      toast('❌ Erreur mise à jour match');
      return;
    }

    try { await sb.rpc('recalculate_points', { p_series_id: seriesId }); } catch(e) { console.warn('RPC match:', e); }

    await loadSeries();
    await loadPredictions();
    computeLeaderboard();

    // ── Auto-finish series if a team reaches 4 wins ──────────────
    const series = state.series.find(s => s.id === seriesId);
    if (series && series.status !== 'finished') {
      const allGames = state.games[seriesId] || [];
      const finishedGames = allGames.filter(g => g.status === 'finished');
      let wins1 = 0, wins2 = 0;
      finishedGames.forEach(g => {
        if (g.winner === series.team1) wins1++;
        else if (g.winner === series.team2) wins2++;
      });

      const winnerTeam = wins1 >= 4 ? series.team1 : wins2 >= 4 ? series.team2 : null;
      const totalGames = winnerTeam ? wins1 + wins2 : null;

      if (winnerTeam) {
        // Snapshot AVANT la mise à jour auto-finish
        const snapshotBefore = new Set(state.series.filter(s => s.status === 'finished').map(s => s.id));

        await sb.from('series').update({
          series_winner: winnerTeam,
          series_games: totalGames,
          status: 'finished'
        }).eq('id', seriesId);

        try { await sb.rpc('recalculate_points', { p_series_id: seriesId }); } catch(e) { console.warn('RPC auto-finish:', e); }

        // Reload series FIRST so autoAdvanceToNextRound reads fresh state
        await loadSeries();
        const freshSeries = state.series.find(s => s.id === seriesId);
        if (freshSeries) await autoAdvanceToNextRound(freshSeries, winnerTeam);

        await loadSeries();
        await loadPredictions();
        computeLeaderboard();
        // Bannière pour l'admin + skip l'event realtime qui arrive
        checkAndShowResultBanner(snapshotBefore);
        skipNextSeriesRealtime += 1;
        render();
        toast('🏆 ' + winnerTeam + ' remporte la série ! Passage au tour suivant.');
        return;
      }
    }

    render();
    toast('✅ Résultat du match enregistré');
  } catch (err) {
    console.error('setGameResult crash:', err);
    toast('❌ Erreur JS lors de la validation');
  }
}

async function create7Games(seriesId) {
  skipNextGamesRealtime += 7;
  const gamesPayload = Array.from({length: 7}, (_, i) => ({

    start_time: null,
    status: 'upcoming'
  }));

    skipNextGamesRealtime = Math.max(0, skipNextGamesRealtime - 7);
    console.warn('Erreur création matchs auto:', error);
  }
}

async function autoAdvanceToNextRound(series, winnerTeam) {
  const nextRound = ROUND_NEXT[series.round];
  if (!nextRound) return;

  const isNBAFinals = nextRound === 'Finales NBA';
  const conf = isNBAFinals ? '—' : series.conference;

  const alreadyExists = state.series.find(s =>
    s.round === nextRound &&
    (s.team1 === winnerTeam || s.team2 === winnerTeam)
  );
  if (alreadyExists) return;

  if (isNBAFinals) {
    const existingFinals = state.series.find(s => s.round === 'Finales NBA');
    if (existingFinals && existingFinals.team2 === 'À déterminer') {
      // Already has 7 games — just update the team name
      skipNextSeriesRealtime += 1;
      await sb.from('series').update({ team2: winnerTeam }).eq('id', existingFinals.id);
    } else if (!existingFinals) {
      skipNextSeriesRealtime += 1;
      const { data: newS } = await sb.from('series').insert({
        team1: winnerTeam,
        team2: 'À déterminer',
        round: 'Finales NBA',
        conference: '—',
        status: 'upcoming'
      }).select().single();
      if (newS) await create7Games(newS.id);
    }
  } else {
    const partialSeries = state.series.find(s =>
      s.round === nextRound &&
      s.conference === conf &&
      (s.team1 === 'À déterminer' || s.team2 === 'À déterminer')
    );

    if (partialSeries) {
      // Already has 7 games — just update the team name
      skipNextSeriesRealtime += 1;
      if (partialSeries.team1 === 'À déterminer') {
        await sb.from('series').update({ team1: winnerTeam }).eq('id', partialSeries.id);
      } else {
        await sb.from('series').update({ team2: winnerTeam }).eq('id', partialSeries.id);
      }
    } else {
      skipNextSeriesRealtime += 1;
      const { data: newS } = await sb.from('series').insert({
        team1: winnerTeam,
        team2: 'À déterminer',
        round: nextRound,
        conference: conf,
        status: 'upcoming'
      }).select().single();
      if (newS) await create7Games(newS.id);
    }
  }
}

async function onboardCreate() {
  const name=document.getElementById('ob-name')?.value.trim();
  const pin=document.getElementById('ob-pin')?.value;
  const pin2=document.getElementById('ob-pin2')?.value;
  if(!name) return toast('Entre un prénom !');
  if(!/^\d{4}$/.test(pin)) return toast('Le PIN doit être 4 chiffres exactement.');
  if(pin!==pin2) return toast('Les PINs ne correspondent pas !');
  if(state.players.find(p=>p.name.toLowerCase()===name.toLowerCase())) return toast('❌ Ce prénom est déjà pris !');

  const player = await createPlayer(name, pin);
  if (!player) return;

  // Upload la photo si une a été sélectionnée
  if (_obAvatarFile) {
    const url = await uploadAvatar(_obAvatarFile, player.id);
    if (url) {
      await saveAvatarUrl(player.id, url);
      player.avatar_url = url;
    }
    _obAvatarFile = null;
  }

  await loadPlayers();
  computeLeaderboard();
  setCurrentPlayer(state.players.find(p => p.id === player.id) || player);
}
async function doLogin() {
  const pid = state.selectedLoginPlayer;
  const pin = document.getElementById('ob-login-pin')?.value;

  if (!pid) return toast('Sélectionne ton profil !');

  const player = state.players.find(p => p.id === pid);
  if (!player) return toast('Profil introuvable.');

  // PIN remis à zéro : le joueur doit en créer un nouveau
  if (!player.pin_hash) {
    const np = prompt(`Ton PIN a été réinitialisé. Choisis un nouveau PIN à 4 chiffres :`);
    if (!np) return;
    if (!/^\d{4}$/.test(np)) return toast('Le PIN doit contenir exactement 4 chiffres.');

    const c = prompt('Confirme ton nouveau PIN :');
    if (np !== c) return toast('Les deux PINs ne correspondent pas.');

    const { error } = await sb
      .from('players')
      .update({ pin_hash: await hashPin(np) })
      .eq('id', pid);

    if (error) {
      console.error(error);
      return toast(`❌ Erreur création PIN : ${error.message}`);
    }

    await loadPlayers();
    const updated = state.players.find(p => p.id === pid) || player;
    setCurrentPlayer(updated);
    toast('✅ Nouveau PIN enregistré');
    return;
  }

  if (!pin) return toast('Entre ton PIN !');

  if (!(await verifyPin(player, pin))) return toast('❌ PIN incorrect !');

  setCurrentPlayer(player);
}
